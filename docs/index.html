<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>FireRaven</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#161826">
<meta name="color-scheme" content="dark">
<meta name="referrer" content="no-referrer">
<!-- The app is one self-contained file that talks to exactly one host. Locking
     that down means a malicious merchant name or pasted CSV can never phone
     home, load a script, or frame anything. -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'none';
  script-src 'self' 'unsafe-inline';
  style-src 'self' 'unsafe-inline';
  img-src 'self' data: blob:;
  font-src 'self';
  connect-src 'self' https://api.anthropic.com;
  manifest-src 'self';
  worker-src 'self';
  base-uri 'none';
  form-action 'none';
  frame-ancestors 'none';
  object-src 'none'">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FireRaven">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* ══════════════════════════════════════════════════════════════
   FireRaven — Nocturne design system (dark blurple). Self-contained,
   no build step, no external dependencies. All data lives on-device.
   ══════════════════════════════════════════════════════════════ */
:root{
  color-scheme:dark;
  --bg:#161826; --surface:#232532; --surface-2:#1c1a2c; --card:#232532;
  --text:#e9e9ed; --muted:#8b8ea3; --faint:#6b6f84;
  --accent:#9184d9; --accent-2:#b5abfc; --accent-soft:#3a3760;
  --accent-800:#423a6a; --accent-900:#2b2741;
  --good:#9fdcc0; --warn:#f5a623; --bad:#f0a6a6; --income:#79d6a8;
  --save:#e8c07a; --save-dim:#3a3223;
  --divider:rgba(255,255,255,.08);
  --radius:14px; --radius-sm:10px;
  --shadow-sm:0 0 0 1px rgba(255,255,255,.05);
  --shadow-md:0 6px 20px rgba(0,0,0,.45);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
/* Edge-to-edge: no frame, no hairline, no light-scheme gutter anywhere. */
html{background:#161826;height:100%;overscroll-behavior-y:none;border:0}
body{
  height:100%;overscroll-behavior-y:none;border:0;
  background:#161826;color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;
}
#app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;position:relative;
  background:var(--bg);border:0;outline:0}
.screen{flex:1;min-height:0;display:flex;flex-direction:column}
.page{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:16px;
  padding:calc(16px + var(--safe-top)) 18px calc(96px + var(--safe-bottom));-webkit-overflow-scrolling:touch}
.page.nonav{padding-bottom:calc(24px + var(--safe-bottom))}
.page::-webkit-scrollbar{width:0}
h1,h2,h3,h4{font-weight:600;letter-spacing:-.015em;line-height:1.15}
.h-title{font-size:22px;font-weight:700;letter-spacing:-.02em}
.muted{color:var(--muted)}.faint{color:var(--faint)}
.good{color:var(--good)}.bad{color:var(--bad)}.warn{color:var(--warn)}.income{color:var(--income)}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,select,textarea{font-family:inherit}
.row{display:flex;align-items:center;gap:12px}
.between{display:flex;align-items:center;justify-content:space-between}
.grow{flex:1;min-width:0}
.nowrap{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-size:14px;font-weight:600;
  padding:10px 16px;border-radius:var(--radius-sm);transition:background .12s,opacity .12s;line-height:1.2}
.btn:disabled{opacity:.45;pointer-events:none}
.btn-primary{background:var(--accent);color:#161826}
.btn-primary:active{background:var(--accent-2)}
.btn-ghost{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}
.btn-ghost:active{background:#2b2d3d}
.btn-danger{background:transparent;color:var(--bad);box-shadow:inset 0 0 0 1px #5a3a3a}
.btn-block{width:100%}
.link{background:0;border:0;color:var(--accent-2);cursor:pointer;font:inherit;font-size:13px;padding:0;font-weight:600}
.icon-btn{width:38px;height:38px;border-radius:50%;background:var(--surface);display:flex;align-items:center;
  justify-content:center;color:var(--accent-2);flex:none;box-shadow:var(--shadow-sm)}
.icon-btn:active{background:#2b2d3d}

/* cards */
.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:12px}
.card-tight{padding:14px;gap:10px}

/* inputs */
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;color:var(--muted);font-weight:500}
.input{width:100%;min-height:44px;padding:10px 13px;font-size:15px;color:var(--text);
  background:var(--surface);border:1px solid var(--divider);border-radius:var(--radius-sm);caret-color:var(--accent)}
.input:focus{outline:none;border-color:var(--accent)}
select.input{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%238b8ea3' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:36px}
textarea.input{min-height:70px;resize:vertical}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-size:13px;color:#a9acbe;background:var(--surface);border:1px solid transparent;border-radius:999px;
  padding:8px 14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;line-height:1;transition:background .1s}
.chip-on{color:#161826;background:var(--accent);border-color:var(--accent);font-weight:600}
.chip-sm{padding:2px 9px;font-size:11px}

/* tags */
.tag{display:inline-flex;align-items:center;font-size:10px;font-weight:600;letter-spacing:.03em;
  padding:2px 8px;border-radius:6px;line-height:1.4}
.tag-review{border:1px solid var(--warn);color:var(--warn)}
.tag-new{background:var(--accent-800);color:#f5f4ff}
.tag-recur{background:#2b3a45;color:#8fd0e0}

/* transaction rows */
.tx{display:flex;align-items:center;gap:12px;padding:8px 6px;border-radius:var(--radius-sm);cursor:pointer;transition:background .1s}
.tx:active{background:rgba(145,132,217,.09)}
.tx-ic{width:40px;height:40px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;
  font-size:19px;background:var(--surface)}
.tx-amt{font-size:15px;font-weight:600;flex:none}
.tx-sub{font-size:12px;color:var(--muted)}

/* progress bar */
.bar{height:8px;border-radius:5px;background:var(--surface);overflow:hidden}
.bar>span{display:block;height:100%;border-radius:5px;transition:width .3s}

/* raven mascot */
.raven{background:center/contain no-repeat url("raven.png");image-rendering:auto;flex:none}

/* bottom nav */
.navbar{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:flex-end;justify-content:space-between;
  padding:8px 14px calc(8px + var(--safe-bottom));background:linear-gradient(to top,#191b29 62%,rgba(25,27,41,0));
  border-top:1px solid rgba(255,255,255,.045);backdrop-filter:blur(10px)}
.nav-i{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);font-size:9.5px;
  font-weight:600;letter-spacing:.01em;background:0;border:0;cursor:pointer;padding:6px 2px;position:relative;flex:1}
.nav-i.on{color:var(--accent)}
.fab{width:54px;height:54px;border-radius:17px;background:var(--accent);color:#161826;display:flex;align-items:center;
  justify-content:center;margin-bottom:4px;box-shadow:0 8px 22px rgba(145,132,217,.45)}
.fab:active{background:var(--accent-2)}

/* sheet / modal */
.overlay{position:absolute;inset:0;z-index:60;background:rgba(13,15,24,.72);display:flex;align-items:flex-end;
  animation:fade .15s ease}
.sheet{background:var(--surface-2);width:100%;border-radius:22px 22px 0 0;padding:20px 20px calc(22px + var(--safe-bottom));
  display:flex;flex-direction:column;gap:14px;box-shadow:0 -12px 40px rgba(0,0,0,.5);max-height:88%;overflow-y:auto;
  animation:slideup .2s cubic-bezier(.2,.8,.2,1)}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes slideup{from{transform:translateY(24px)}to{transform:translateY(0)}}

/* toast */
#toast{position:fixed;left:50%;bottom:calc(96px + var(--safe-bottom));transform:translateX(-50%);z-index:200;
  display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:calc(100% - 40px);max-width:480px}
.toast{background:#2b2d3d;color:var(--text);font-size:13.5px;font-weight:500;padding:11px 16px;border-radius:12px;
  box-shadow:var(--shadow-md);animation:fade .15s ease;max-width:100%;text-align:center;line-height:1.4}
.toast.ok{box-shadow:var(--shadow-md),inset 0 0 0 1px rgba(159,220,192,.4)}
.toast.err{box-shadow:var(--shadow-md),inset 0 0 0 1px rgba(240,166,166,.4)}

/* misc */
.glow{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(229,72,77,.32),transparent 66%);filter:blur(3px)}
.dots{display:flex;gap:7px}
.dots span{width:7px;height:7px;border-radius:50%;background:var(--accent-soft)}
.dots span.on{background:var(--accent)}
.typing{display:inline-flex;gap:4px;align-items:center;padding:4px 2px}
.typing i{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.25}30%{opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.bubble{max-width:82%;padding:10px 13px;border-radius:15px;font-size:14px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.b-ai{background:var(--surface);border-top-left-radius:4px;align-self:flex-start}
.b-me{background:#3a3760;color:#f5f4ff;border-top-right-radius:4px;align-self:flex-end}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;padding:40px 10px;color:var(--muted)}
.kpi{font-size:38px;font-weight:700;letter-spacing:-.025em}
.section-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
.donut text{fill:var(--text)}
hr.rule{border:0;height:1px;background:var(--divider);margin:2px 0}
.swatch{width:10px;height:10px;border-radius:3px;flex:none}

/* ── v4 additions ───────────────────────────────────────────── */
/* hero panels */
.hero{border-radius:20px;padding:18px;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
.hero-spend{background:linear-gradient(150deg,#2b2741 0%,#232532 55%,#1d1f2e 100%);box-shadow:var(--shadow-sm)}
.hero-save{background:linear-gradient(150deg,#3a3223 0%,#282738 60%,#1f2130 100%);box-shadow:inset 0 0 0 1px rgba(232,192,122,.22)}
.hero:after{content:'';position:absolute;top:-60px;right:-40px;width:150px;height:150px;border-radius:50%;
  background:radial-gradient(circle,rgba(145,132,217,.22),transparent 70%);pointer-events:none}
.hero-save:after{background:radial-gradient(circle,rgba(232,192,122,.18),transparent 70%)}

/* stat grid */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--card);border-radius:var(--radius);padding:13px 14px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:3px}
.stat b{font-size:19px;font-weight:700;letter-spacing:-.02em;line-height:1.2}
.stat span{font-size:10.5px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;font-weight:600}
.stat small{font-size:11px;color:var(--faint)}

/* section heading */
.sec{display:flex;align-items:center;gap:9px;margin-top:6px}
.sec h3{font-size:15.5px;font-weight:650;letter-spacing:-.015em}
.sec .sec-ic{width:26px;height:26px;border-radius:8px;background:var(--accent-900);color:var(--accent-2);
  display:flex;align-items:center;justify-content:center;font-size:13px;flex:none}

/* save / opportunity cards */
.opp{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow-sm);display:flex;gap:12px;align-items:flex-start}
.opp-ic{width:34px;height:34px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center;font-size:16px;
  background:var(--save-dim);color:var(--save)}
.opp-amt{font-size:13px;font-weight:700;color:var(--save);white-space:nowrap}
.opp.done{opacity:.5}
.opp.done .opp-title{text-decoration:line-through}

/* sub rows */
.sub{display:flex;align-items:center;gap:11px;padding:11px 0}
.sub+.sub{border-top:1px solid var(--divider)}
.sub.off .sub-name{text-decoration:line-through;color:var(--muted)}
.btn-mini{font-size:11px;font-weight:600;padding:6px 11px;border-radius:8px;background:var(--surface);
  box-shadow:var(--shadow-sm);color:var(--muted);flex:none}
.btn-mini.on{background:var(--save-dim);color:var(--save);box-shadow:inset 0 0 0 1px rgba(232,192,122,.35)}

/* day-of-week + daily bars */
.dow{display:flex;align-items:flex-end;gap:6px;height:78px}
.dow-b{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;justify-content:flex-end}
.dow-b i{width:100%;max-width:22px;border-radius:4px;background:var(--accent-soft);display:block}
.dow-b i.hi{background:var(--accent)}
.dow-b span{font-size:9px;color:var(--muted)}
.spark{display:flex;align-items:flex-end;gap:2px;height:44px}
.spark i{flex:1;border-radius:2px;background:var(--accent-soft);min-height:2px}
.spark i.today{background:var(--accent-2)}

/* delta pills */
.delta{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap}
.delta.up{background:rgba(240,166,166,.14);color:var(--bad)}
.delta.down{background:rgba(159,220,192,.14);color:var(--good)}
.delta.flat{background:var(--surface);color:var(--muted)}

/* segmented control */
.seg{display:flex;background:var(--surface);border-radius:11px;padding:3px;gap:3px}
.seg button{flex:1;font-size:12.5px;font-weight:600;padding:8px 4px;border-radius:9px;color:var(--muted)}
.seg button.on{background:var(--accent-900);color:var(--accent-2)}

/* PIN lock */
.lock{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;
  padding:calc(30px + var(--safe-top)) 26px calc(30px + var(--safe-bottom))}
.pin-dots{display:flex;gap:15px}
.pin-dots i{width:13px;height:13px;border-radius:50%;background:var(--accent-soft);transition:background .12s,transform .12s}
.pin-dots i.on{background:var(--accent);transform:scale(1.14)}
.pin-dots.bad i{background:var(--bad)}
.shake{animation:shake .38s cubic-bezier(.36,.07,.19,.97)}
@keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:270px}
.pad button{height:64px;border-radius:50%;font-size:25px;font-weight:500;background:var(--surface);
  box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;transition:background .1s}
.pad button:active{background:var(--accent-900)}
.pad button.blank{background:none;box-shadow:none;pointer-events:none}
.pad button.fn{font-size:13px;font-weight:600;background:none;box-shadow:none;color:var(--muted)}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<input id="img-input" type="file" accept="image/*" multiple hidden>
<input id="cam-input" type="file" accept="image/*" capture="environment" hidden>
<input id="restore-input" type="file" accept="application/json,.json" hidden>

<script>
"use strict";
/* ════════════════════════════════════════════════════════════════════
   FireRaven — personal spend tracker (v3, dependency-free rebuild)
   Data model, persistence, AI transport, analytics, and UI in one file.
   ════════════════════════════════════════════════════════════════════ */

// ---- constants ----------------------------------------------------------
const LS_KEY = 'fireraven_v2';
const LS_KEY_LEGACY = 'fireraven_v1';
const LS_APIKEY = 'fireraven_key';
const LS_PIN = 'fireraven_pin';     // { salt, hash, iters } — never the PIN itself
const LS_SEEN = 'fireraven_seen';   // last-active timestamp, for auto-lock
const LS_FAIL = 'fireraven_fail';   // { n, until } — PIN attempt throttling
const APP_VERSION = 6;

/* ── App lock ──────────────────────────────────────────────────────────
   The starting PIN is 1177, but this repository is public, so only a
   PBKDF2-SHA256 *verifier* is stored here — never the digits. The app
   only ever needs to CHECK a PIN, never to recover it, so the plaintext
   has no reason to exist in source control.
   This is a device lock, not encryption: it keeps a person holding your
   unlocked phone out of your finances. Change it in Settings → App lock. */
const PIN_DEFAULT = { salt:'fireraven-pin-v1-9c4e2a', iters:210000,
  hash:'761acfcab36c3dcd860bdc4bef156246dfb6bc8eb4c6654e2e086f42b6d8f052' };

const DEFAULT_CATS = [
  { name:'Groceries',     color:'#9184d9', icon:'🛒' },
  { name:'Dining',        color:'#b5abfc', icon:'🍽️' },
  { name:'Transport',     color:'#6c63a6', icon:'🚗' },
  { name:'Shopping',      color:'#7c88c0', icon:'🛍️' },
  { name:'Subscriptions', color:'#8a7fd0', icon:'🔁' },
  { name:'Bills',         color:'#5d5294', icon:'🧾' },
  { name:'Health',        color:'#6ec2a0', icon:'➕' },
  { name:'Entertainment', color:'#c98fd0', icon:'🎬' },
  { name:'Other',         color:'#5a5d78', icon:'•'  },
];
const DEFAULT_INCOME_CATS = [
  { name:'Salary',      color:'#79d6a8', icon:'💼' },
  { name:'Freelance',   color:'#6ec2a0', icon:'✍️' },
  { name:'Side income', color:'#5aa8e0', icon:'⚡' },
  { name:'Investments', color:'#e0b15a', icon:'📈' },
  { name:'Benefits',    color:'#8a7fd0', icon:'🏛️' },
  { name:'Other',       color:'#5a5d78', icon:'•'  },
];
// How many times a year each cadence occurs, expressed per month.
const CADENCE = {
  weekly:      { per:52/12, label:'Weekly' },
  biweekly:    { per:26/12, label:'Every 2 weeks' },
  semimonthly: { per:2,     label:'Twice a month' },
  monthly:     { per:1,     label:'Monthly' },
  quarterly:   { per:1/3,   label:'Quarterly' },
  semiannual:  { per:1/6,   label:'Every 6 months' },
  annual:      { per:1/12,  label:'Yearly' },
};
const CADENCE_KEYS = Object.keys(CADENCE);
function perMonth(amount, cadence){ return (Number(amount)||0) * ((CADENCE[cadence]||CADENCE.monthly).per); }
function cadenceLabel(c){ return (CADENCE[c]||CADENCE.monthly).label; }

const SWATCHES = ['#9184d9','#b5abfc','#6c63a6','#7c88c0','#8a7fd0','#5d5294','#6ec2a0','#c98fd0','#e0a05a','#5aa8e0','#e07a9a','#5a5d78'];
const MODELS = [
  { id:'claude-haiku-4-5',  label:'Haiku 4.5 — fastest & cheapest' },
  { id:'claude-sonnet-5',   label:'Sonnet 5 — best accuracy' },
  { id:'claude-opus-4-8',   label:'Opus 4.8 — most capable' },
];
const MON_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MON_LONG  = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// ---- state --------------------------------------------------------------
// Persisted in S.data; transient UI in S.ui.
let S = {
  data: null,   // { onboarded, settings, categories, merchantMap, txs, messages }
  apiKey: '',
  ui: {
    screen: 'home', obStep: 0,
    month: null,               // 'YYYY-MM' selected in Home/Insights/Activity
    addTab: 'upload',
    scan: { state:'idle', pct:0, msg:'', file:'', error:'', added:0, review:0 },
    add: { merchant:'', amount:'', cat:'Groceries', type:'expense', date:'', note:'' },
    modal: null,               // { kind, ... }
    search: '', filterCat: 'All',
    draft: '',
    reviewSel: {},
    saveTab: 'ideas',          // Save screen: ideas | subs | leaks
    pin: '', pinBad:false, pinMode:'unlock', pinStage:0, pinFirst:'',
    aiBusy: false,
  },
  locked: false,
  _timer: null,
};

// ---- utilities ----------------------------------------------------------
const $ = (sel) => document.querySelector(sel);
const uid = (p) => p + Math.random().toString(36).slice(2, 9);
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function cur(){ return (S.data && S.data.settings.currency) || 'CAD'; }
function locale(){ return (S.data && S.data.settings.locale) || 'en-CA'; }
function money(n, opts){
  const val = Number(n) || 0;
  try {
    return new Intl.NumberFormat(locale(), Object.assign({ style:'currency', currency:cur(), currencyDisplay:'narrowSymbol' }, opts||{})).format(val);
  } catch (e){
    return '$' + val.toFixed(2);
  }
}
const money0 = (n) => money(n, { minimumFractionDigits:0, maximumFractionDigits:0 });

// dates are ISO 'YYYY-MM-DD'
function todayISO(){ const d=new Date(); return isoFrom(d); }
function isoFrom(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function monthKey(iso){ return (iso||'').slice(0,7); }
function curMonthKey(){ return todayISO().slice(0,7); }
function fmtDate(iso){
  const p = (iso||'').split('-'); if (p.length<3) return iso||'';
  return MON_SHORT[(+p[1])-1] + ' ' + (+p[2]);
}
function monthLabel(key){
  const p=(key||'').split('-'); if(p.length<2) return '';
  return MON_LONG[(+p[1])-1] + ' ' + p[0];
}
function monthShiftKey(key, delta){
  const p=(key||curMonthKey()).split('-'); let y=+p[0], m=(+p[1])-1+delta;
  y += Math.floor(m/12); m=((m%12)+12)%12;
  return y+'-'+String(m+1).padStart(2,'0');
}
// Build an ISO date, clamping to something real. An out-of-range month or day
// would otherwise produce a string like "2026-14-07", which passes a naive
// format check and then silently corrupts every month total and sort.
function mkISO(y, mo, d){
  y = Math.min(2999, Math.max(1970, y|0));
  mo = Math.min(12, Math.max(1, mo|0));
  const maxD = new Date(y, mo, 0).getDate();
  d = Math.min(maxD, Math.max(1, d|0));
  return y+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0');
}
function isValidISO(s){
  if (!/^\d{4}-\d{2}-\d{2}$/.test(s||'')) return false;
  const [y,mo,d]=s.split('-').map(Number);
  return mo>=1 && mo<=12 && d>=1 && d<=new Date(y,mo,0).getDate();
}
// parse a loose date string ("Oct 18", "2025-10-18", "18/10/2025") into ISO
function parseLooseDate(str){
  if (!str) return todayISO();
  str = String(str).trim();
  let m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); // ISO
  if (m) return mkISO(+m[1], +m[2], +m[3]);
  // Numeric d/m/y or m/d/y. Canadian receipts use both, so infer from the
  // values: a first part >12 can only be a day, a second part >12 only a day.
  // Genuinely ambiguous dates fall back to month-first.
  m = str.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
  if (m){
    let y=+(m[3].length===2?'20'+m[3]:m[3]);
    const a=+m[1], b=+m[2];
    const dayFirst = a>12 || (b<=12 && false);
    return dayFirst ? mkISO(y, b, a) : mkISO(y, a, b);
  }
  m = str.match(/([A-Za-z]{3,})\.?\s+(\d{1,2})(?:,?\s*(\d{4}))?/); // "Oct 18" / "October 18, 2025"
  if (m){
    const mi = MON_SHORT.findIndex(x=>x.toLowerCase()===m[1].slice(0,3).toLowerCase());
    if (mi>=0){
      const day=+m[2], now=new Date();
      let year = m[3] ? +m[3] : now.getFullYear();
      if (!m[3]){ // no year: if that date is in the future, assume last year
        const cand=new Date(year, mi, day);
        if (cand.getTime() > now.getTime()+86400000) year--;
      }
      return mkISO(year, mi+1, day);
    }
  }
  const d = new Date(str);
  return isNaN(d) ? todayISO() : isoFrom(d);
}

function normMerchant(m){
  return String(m||'').toLowerCase()
    .replace(/[#*]/g,' ').replace(/\b\d[\d.,-]*\b/g,' ')  // drop store codes / numbers
    .replace(/\b(pos|purchase|inc|ltd|llc|co|the|store|payment|debit|visa|mastercard)\b/g,' ')
    .replace(/[^a-z\s]/g,' ').replace(/\s+/g,' ').trim().split(' ').slice(0,3).join(' ');
}

function toast(msg, kind){
  const el = document.createElement('div');
  el.className = 'toast' + (kind ? ' '+kind : '');
  el.textContent = msg;
  $('#toast').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2600);
}

    onboarded: false,
    settings: { currency:'CAD', locale:'en-CA', monthlyBudget:1600, insightsOn:true, model:'claude-haiku-4-5',
                lockOn:true, autoLockMin:3, savingsGoal:0, startingBalance:0, forecastMonths:12 },

    merchantMap: {},
    subState: {},      // normalized merchant key -> 'cancelled'
    savings:  null,    // { at, items:[{buy, alt, why, save}] } — cached AI suggestions
    done:     {},      // dismissed/actioned savings opportunities, id -> true
    txs: [],

}
function load(){
  try { S.apiKey = localStorage.getItem(LS_APIKEY) || ''; } catch(e){}
  let raw = null;
  try { raw = localStorage.getItem(LS_KEY); } catch(e){}
  if (raw){
    try { S.data = normalizeData(JSON.parse(raw)); return; } catch(e){}
  }
  // migrate legacy v1 schema
  try {
    const old = localStorage.getItem(LS_KEY_LEGACY);
    if (old){ S.data = migrateV1(JSON.parse(old)); save(); return; }
  } catch(e){}
  S.data = freshData();
}
function normalizeData(d){
  const base = freshData();
  const out = {
    onboarded: !!d.onboarded,
    settings: Object.assign(base.settings, d.settings||{}),
    categories: Array.isArray(d.categories)&&d.categories.length ? d.categories : base.categories,
    incomeCats: Array.isArray(d.incomeCats)&&d.incomeCats.length ? d.incomeCats : base.incomeCats,
    income: Array.isArray(d.income) ? d.income.map(normalizeStream) : [],
    recur:  Array.isArray(d.recur)  ? d.recur.map(normalizeStream)  : [],
    merchantMap: d.merchantMap || {},
    subState: d.subState || {},
    savings: d.savings || null,
    done: d.done || {},
    txs: Array.isArray(d.txs) ? d.txs.map(normalizeTx) : [],
    messages: Array.isArray(d.messages)&&d.messages.length ? d.messages : base.messages,
  };
  return out;
}

// ---- app lock (PBKDF2-SHA256 verifier; the PIN itself is never stored) ---
function pinRecord(){
  try { const r=JSON.parse(localStorage.getItem(LS_PIN)||'null'); if (r&&r.hash&&r.salt&&r.iters) return r; } catch(e){}
  return PIN_DEFAULT;
}
function toHex(buf){ return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join(''); }
async function pinHash(pin, salt, iters){
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(String(pin)), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name:'PBKDF2', salt:enc.encode(salt), iterations:iters, hash:'SHA-256' }, km, 256);
  return toHex(bits);
}
async function pinVerify(pin){
  const r = pinRecord();
  try { return (await pinHash(pin, r.salt, r.iters)) === r.hash; }
  catch(e){ return false; }               // no WebCrypto (insecure origin) → fail closed
}
async function pinSet(pin){
  const salt = 'fr-' + toHex(crypto.getRandomValues(new Uint8Array(12)));
  const iters = 210000;
  const hash = await pinHash(pin, salt, iters);
  try { localStorage.setItem(LS_PIN, JSON.stringify({ salt, iters, hash })); } catch(e){}
}
// WebCrypto only exists on secure origins (https / localhost). Without it we
// cannot verify a PIN — so we must not lock, or the app would be unopenable.
function cryptoOK(){ return !!(window.crypto && crypto.subtle && crypto.subtle.deriveBits); }
function lockEnabled(){ return !!(S.data && S.data.settings.lockOn) && cryptoOK(); }

/* Guessing throttle. A 4-digit PIN is only 10,000 combinations, so without a
   delay someone could sit and tap through them. After 4 wrong tries the pad
   locks out, doubling each time up to 5 minutes. Stored so it survives a
   reload — closing the tab must not reset the penalty. */
function failState(){
  try { const f=JSON.parse(localStorage.getItem(LS_FAIL)||'null'); if (f&&typeof f.n==='number') return f; } catch(e){}
  return { n:0, until:0 };
}
function lockoutLeft(){
  const f=failState();
  return f.until>Date.now() ? Math.ceil((f.until-Date.now())/1000) : 0;
}
function noteFail(){
  const f=failState();
  f.n++;
  if (f.n>=4) f.until = Date.now() + Math.min(300, Math.pow(2, f.n-3)*15)*1000;
  try { localStorage.setItem(LS_FAIL, JSON.stringify(f)); } catch(e){}
}
function clearFails(){ try { localStorage.removeItem(LS_FAIL); } catch(e){} }
function touchSeen(){ try{ localStorage.setItem(LS_SEEN, String(Date.now())); }catch(e){} }
function shouldRelock(){
  if (!lockEnabled()) return false;
  let last = 0; try { last = +(localStorage.getItem(LS_SEEN)||0); } catch(e){}
  const mins = Number(S.data.settings.autoLockMin);
  if (!last) return true;
  if (mins <= 0) return false;                      // "never" while the tab lives
  return (Date.now() - last) > mins*60000;
}
// Shared shape for income sources and manual recurring bills.
function normalizeStream(s){
  return {
    id: s.id || uid('s'),
    name: String(s.name||'Untitled').slice(0,60),
    category: s.category || null,
    amount: Math.abs(Number(s.amount))||0,
    cadence: CADENCE[s.cadence] ? s.cadence : 'monthly',
    nextDate: isValidISO(s.nextDate) ? s.nextDate : '',
    active: s.active !== false,
    note: String(s.note||'').slice(0,120),
  };
}
function normalizeTx(t){
  return {
    id: t.id || uid('t'),
    merchant: String(t.merchant||'Unknown').slice(0,60),
    category: t.category || null,
    amount: Math.abs(Number(t.amount))||0,
    type: t.type==='income'?'income':'expense',
    date: isValidISO(t.date) ? t.date : parseLooseDate(t.date),
    note: t.note || '',
    needsReview: !!t.needsReview,
    source: t.source || 'manual',
    demo: !!t.demo,
  };
}
function migrateV1(d){
  const out = freshData();
  out.onboarded = !!d.obDone;
  out.settings.monthlyBudget = d.budget || 1600;
  out.settings.insightsOn = d.insightsOn !== false;
  if (Array.isArray(d.messages) && d.messages.length) out.messages = d.messages;
  out.txs = (Array.isArray(d.txs)?d.txs:[]).map(t => normalizeTx({
    id: t.id, merchant: t.merchant, category: t.category, amount: t.amount,
    date: parseLooseDate(t.date), type:'expense',
    needsReview: !!t.needsReview, source: t.imported?'import':'seed',
  }));
  return out;
}
function save(){
  try { localStorage.setItem(LS_KEY, JSON.stringify(S.data)); } catch(e){}
}

// ---- category helpers ---------------------------------------------------
function cats(){ return S.data.categories; }
function catNames(){ return cats().map(c=>c.name); }
function catBy(name){ return cats().find(c=>c.name===name) || { name:name||'Other', color:'#5a5d78', icon:'•', budget:0 }; }
function learnMerchant(merchant, category){
  if (!category) return;
  const k = normMerchant(merchant);
  if (k) { S.data.merchantMap[k] = category; }
}
function guessCategory(merchant){
  const k = normMerchant(merchant);
  if (k && S.data.merchantMap[k]) return { cat:S.data.merchantMap[k], learned:true };
  const s = (merchant||'').toLowerCase();
  const kw = [
    [/cafe|coffee|tim horton|starbuck|restaurant|dining|grill|sushi|pizza|mcdonald|keg|bar\b|pub|kitchen|eatery|uber eats|doordash|skip/, 'Dining'],
    [/loblaw|metro|costco|grocery|market|mrkt|walmart|superstore|no frills|food basics|sobey/, 'Groceries'],
    [/uber|lyft|presto|petro|shell|esso|gas\b|transit|parking|via rail|airline|air canada/, 'Transport'],
    [/netflix|spotify|prime|disney|apple\.com|youtube|patreon|subscription|adobe|icloud/, 'Subscriptions'],
    [/hydro|rogers|bell|telus|fido|insurance|utility|internet|mortgage|rent\b/, 'Bills'],
    [/pharma|shoppers|clinic|dental|doctor|gym|fitness|health/, 'Health'],
    [/cinema|cineplex|theatre|steam|nintendo|playstation|xbox|concert|ticket/, 'Entertainment'],
    [/amazon|amzn|uniqlo|canadian tire|best buy|ikea|store|shop/, 'Shopping'],
  ];
  for (const [re,c] of kw) if (re.test(s) && catNames().includes(c)) return { cat:c, learned:false };
  return { cat:null, learned:false };
}

// ---- analytics ----------------------------------------------------------
function monthTxs(key){ return S.data.txs.filter(t=>monthKey(t.date)===key); }
function sumExpenses(list){ return list.filter(t=>t.type!=='income').reduce((a,t)=>a+t.amount,0); }
function sumIncome(list){ return list.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0); }
function categoryTotals(list){
  const tot={};
  list.filter(t=>t.type!=='income'&&t.category).forEach(t=>{ tot[t.category]=(tot[t.category]||0)+t.amount; });
  return Object.keys(tot).map(name=>({ name, amount:tot[name], color:catBy(name).color, icon:catBy(name).icon }))
    .sort((a,b)=>b.amount-a.amount);
}
function trend(months){
  const out=[]; let k=curMonthKey();
  for (let i=months-1;i>=0;i--){
    const key=monthShiftKey(curMonthKey(), -i);
    out.push({ key, label:MON_SHORT[(+key.split('-')[1])-1], value:sumExpenses(monthTxs(key)) });
  }
  return out;
}
// Every distinct merchant, aggregated across all history.
function merchantStats(){
  const g={};
  S.data.txs.filter(t=>t.type!=='income').forEach(t=>{
    const k=normMerchant(t.merchant)||t.merchant.toLowerCase();
    const e = g[k] || (g[k]={ key:k, name:t.merchant, months:new Set(), dates:[], amts:[], cat:t.category, count:0 });
    e.months.add(monthKey(t.date)); e.dates.push(t.date); e.amts.push(t.amount);
    e.count++; e.name=t.merchant;
    if (t.category) e.cat=t.category;
  });
  return Object.values(g).map(e=>{
    const total=e.amts.reduce((a,b)=>a+b,0);
    const nMonths=Math.max(1,e.months.size);
    const mean=total/e.count;
    // coefficient of variation — a real subscription bills the same amount every time
    const sd=Math.sqrt(e.amts.reduce((a,x)=>a+(x-mean)*(x-mean),0)/e.count);
    e.dates.sort();
    return { key:e.key, name:e.name, cat:e.cat, count:e.count, total,
             avg: mean, monthly: total/nMonths, nMonths, cv: mean?sd/mean:1,
             last: e.dates[e.dates.length-1], first: e.dates[0] };
  }).sort((a,b)=>b.total-a.total);
}
// Brands that are a recurring commitment regardless of how they were categorized.
const SUB_BRANDS = /netflix|spotify|disney|crave|prime|hulu|paramount|apple ?(tv|music|one)|icloud|youtube|adobe|dropbox|patreon|audible|xbox|playstation|nintendo|google one|microsoft|notion|figma|rogers|bell|telus|fido|koodo|virgin|hydro|enbridge|insurance|mortgage|rent\b|gym|goodlife|fitness|planet fit|storage/i;

// Recurring = same merchant in >=2 distinct months (or tagged Subscriptions),
// with a steady amount. Amount stability separates a real subscription from
// "I happen to shop at Loblaws every month".
function recurring(){
  return merchantStats().filter(m=>m.nMonths>=2 || m.cat==='Subscriptions').map(m=>{
    const monthly = m.total/m.nMonths;
    const branded = SUB_BRANDS.test(m.name);
    // A commitment is a bill you signed up for — not just a shop you visit often.
    // Category or brand establishes intent; a near-constant amount confirms it.
    const committed = m.cat==='Subscriptions' || branded ||
                      (m.cat==='Bills' && m.count<=m.nMonths*1.3 && m.cv<0.15);
    const steady = committed && m.count <= m.nMonths*1.5;
    return Object.assign({}, m, {
      monthly, annual: monthly*12, steady, committed, branded,
      next: nextDue(m.last),
      cancelled: S.data.subState[m.key]==='cancelled',
    });
  }).sort((a,b)=>b.annual-a.annual);
}
// Real recurring commitments you could cancel.
function subscriptions(){ return recurring().filter(r=>r.steady); }
// Merchants you simply visit often — useful to see, but not cancellable.
function regulars(){ return recurring().filter(r=>!r.steady && r.nMonths>=2).slice(0,8); }
function nextDue(lastISO){
  if (!lastISO) return '';
  const p=lastISO.split('-'); const d=new Date(+p[0], +p[1]-1, +p[2]);
  while (d.getTime() < Date.now()) d.setMonth(d.getMonth()+1);
  return isoFrom(d);
}

// Income vs expense for a month, plus savings rate.
function cashflow(key){
  const l=monthTxs(key);
  const income=sumIncome(l), spent=sumExpenses(l);
  return { income, spent, net:income-spent, rate: income>0 ? (income-spent)/income*100 : null };
}
// Spend by weekday (0=Sun).
function dowTotals(list){
  const out=[0,0,0,0,0,0,0], n=[0,0,0,0,0,0,0];
  list.filter(t=>t.type!=='income').forEach(t=>{
    const p=t.date.split('-'); const d=new Date(+p[0],+p[1]-1,+p[2]).getDay();
    out[d]+=t.amount; n[d]++;
  });
  return out.map((v,i)=>({ total:v, count:n[i], label:['S','M','T','W','T','F','S'][i] }));
}
// Spend per calendar day of a month.
function dailyTotals(key){
  const p=key.split('-'); const days=new Date(+p[0], +p[1], 0).getDate();
  const out=new Array(days).fill(0);
  monthTxs(key).filter(t=>t.type!=='income').forEach(t=>{ const d=+t.date.slice(8,10); if (d>=1&&d<=days) out[d-1]+=t.amount; });
  return out;
}
// Category movement vs the previous month.
function catDeltas(key){
  const now={}, prev={};
  monthTxs(key).filter(t=>t.type!=='income'&&t.category).forEach(t=>now[t.category]=(now[t.category]||0)+t.amount);
  monthTxs(monthShiftKey(key,-1)).filter(t=>t.type!=='income'&&t.category).forEach(t=>prev[t.category]=(prev[t.category]||0)+t.amount);
  const names=[...new Set([...Object.keys(now),...Object.keys(prev)])];
  return names.map(n=>{
    const a=now[n]||0, b=prev[n]||0;
    return { name:n, now:a, prev:b, delta:a-b, pct: b>0 ? (a-b)/b*100 : (a>0?100:0), color:catBy(n).color, icon:catBy(n).icon };
  }).sort((x,y)=>Math.abs(y.delta)-Math.abs(x.delta));
}
// The number that actually changes daily behaviour: what's left, per day left.
function safeToSpend(key){
  if (key!==curMonthKey()) return null;
  const budget=S.data.settings.monthlyBudget; if (!budget) return null;
  const now=new Date(), day=now.getDate();
  const daysIn=new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const left=Math.max(0, daysIn-day+1);
  const remaining=budget-sumExpenses(monthTxs(key));
  return { remaining, perDay: left>0 ? remaining/left : remaining, daysLeft:left, daysIn, day, over:remaining<0 };
}

// ---- savings engine -----------------------------------------------------
// Deterministic, evidence-based opportunities derived from real transactions.
// Each has a stable id so "done" can be remembered.
function spendingLeaks(){
  const out=[];
  const key=curMonthKey();
  const months=[...new Set(S.data.txs.map(t=>monthKey(t.date)))].sort().slice(-3);
  const recent=S.data.txs.filter(t=>t.type!=='income'&&months.includes(monthKey(t.date)));
  const nM=Math.max(1,months.length);
  const perMonth=(amt)=>amt/nM;
  const ms=merchantStats();

  // 1. Frequent small buys — the classic latte-factor, but measured.
  ms.filter(m=>m.count>=6 && m.avg<25).slice(0,3).forEach(m=>{
    const mo=m.monthly;
    if (mo<20) return;
    out.push({ id:'freq-'+m.key, icon:'☕', kind:'habit',
      title:`${m.name} — ${m.count} visits`,
      detail:`Small buys averaging ${money(m.avg)} add up to about ${money0(mo)}/mo. Halving the visits saves ${money0(mo*0.5)}/mo.`,
      save: mo*0.5 });
  });

  // 2. Dining vs groceries balance.
  const dining=perMonth(recent.filter(t=>t.category==='Dining').reduce((a,t)=>a+t.amount,0));
  const groc  =perMonth(recent.filter(t=>t.category==='Groceries').reduce((a,t)=>a+t.amount,0));
  if (dining>0 && dining>groc*0.6){
    const target=Math.max(groc*0.5, dining*0.65);
    out.push({ id:'dining-ratio', icon:'🍽️', kind:'habit',
      title:'Dining out is outpacing groceries',
      detail:`You spend ${money0(dining)}/mo eating out vs ${money0(groc)}/mo on groceries. Shifting a third of those meals home saves about ${money0(dining-target)}/mo.`,
      save: dining-target });
  }

  // 3. Unused / duplicate subscriptions.
  const subs=subscriptions().filter(s=>!s.cancelled);
  const streaming=subs.filter(s=>/netflix|disney|crave|prime|hulu|paramount|apple tv|spotify|youtube|tidal|deezer/i.test(s.name));
  if (streaming.length>=2){
    const cheapest=streaming.slice().sort((a,b)=>a.monthly-b.monthly);
    const drop=cheapest.slice(0, streaming.length-1).reduce((a,s)=>a+s.monthly,0);
    out.push({ id:'stream-stack', icon:'📺', kind:'subscription',
      title:`${streaming.length} streaming services at once`,
      detail:`${streaming.map(s=>esc(s.name)).join(', ')} cost ${money0(streaming.reduce((a,s)=>a+s.monthly,0))}/mo together. Rotating one at a time — keep one, cancel the rest — saves ${money0(drop)}/mo.`,
      save: drop });
  }
  // Don't double-count: anything already covered by the streaming suggestion.
  const covered=new Set(streaming.map(s=>s.key));
  subs.filter(s=>s.monthly>=8 && !covered.has(s.key)).slice(0,4).forEach(s=>{
    out.push({ id:'sub-'+s.key, icon:'🔁', kind:'subscription',
      title:`${s.name} — ${money(s.monthly)}/mo`,
      detail:`That's ${money0(s.annual)} a year. Most services are 15–20% cheaper billed annually, and the ad-supported tier usually costs about 40% less.`,
      save: s.monthly*0.35 });
  });

  // 4. A category genuinely running hot — measured against its own recent
  //    baseline, and pro-rated so a half-finished month isn't compared to a
  //    full one. Only half the excess is claimed as savings; the rest is noise.
  const prior=[1,2,3].map(i=>monthShiftKey(key,-i))
    .map(k=>({ k, txs:monthTxs(k) })).filter(m=>m.txs.length>=3);
  if (prior.length>=1){
    const now=new Date();
    const partial = key===curMonthKey();
    const daysIn=new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    const frac = partial ? Math.min(1, now.getDate()/daysIn) : 1;
    const catNow={}; monthTxs(key).filter(t=>t.type!=='income'&&t.category)
      .forEach(t=>catNow[t.category]=(catNow[t.category]||0)+t.amount);
    let best=null;
    Object.keys(catNow).forEach(name=>{
      const base = prior.reduce((a,m)=>a+m.txs.filter(t=>t.category===name&&t.type!=='income')
        .reduce((x,t)=>x+t.amount,0),0)/prior.length;
      if (base<25) return;                       // too small a baseline to trust
      const pace = catNow[name]/frac;            // where this month is heading
      const excess = pace-base;
      if (excess>base*0.3 && excess>25 && (!best||excess>best.excess))
        best={ name, base, pace, excess, now:catNow[name] };
    });
    if (best) out.push({ id:'pace-'+best.name, icon:'📈', kind:'trend',
      title:`${best.name} is running ${Math.round(best.excess/best.base*100)}% hot`,
      detail:`${money0(best.now)} so far this month, pacing toward ${money0(best.pace)} against a ${money0(best.base)} average over the last ${prior.length} month${prior.length===1?'':'s'}. Pulling back to your normal level saves about ${money0(best.excess*0.5)}.`,
      save: best.excess*0.5 });
  }

  // 5. Weekend overspend.
  const dow=dowTotals(recent);
  const wknd=(dow[0].total+dow[6].total), wk=dow.slice(1,6).reduce((a,d)=>a+d.total,0);
  if (wknd>0 && wknd/2 > (wk/5)*1.6){
    const excess=perMonth(wknd - (wk/5)*2*1.2);
    if (excess>15) out.push({ id:'weekend', icon:'🗓️', kind:'habit',
      title:'Weekends cost you the most',
      detail:`Saturday and Sunday run about ${Math.round((wknd/2)/(wk/5)*100-100)}% higher per day than weekdays. Setting a weekend cap would keep roughly ${money0(excess)}/mo.`,
      save: excess });
  }

  // 6. Fees — pure waste, always worth flagging.
  // \b matters: "coffee" must not read as "fee".
  const fees=recent.filter(t=>/\bfees?\b|\binterest\b|overdraft|\bnsf\b|late charge|service charge|annual fee/i.test(t.merchant));
  if (fees.length){
    const mo=perMonth(fees.reduce((a,t)=>a+t.amount,0));
    out.push({ id:'fees', icon:'⚠️', kind:'waste',
      title:`${fees.length} fee charge${fees.length===1?'':'s'}`,
      detail:`${money0(mo)}/mo in fees and interest — money that buys you nothing. Auto-pay and a small buffer usually eliminate these entirely.`,
      save: mo });
  }

  // 7. Category over its own budget.
  categoryTotals(monthTxs(key)).forEach(c=>{
    const b=catBudget(c.name);
    if (b>0 && c.amount>b*1.05) out.push({ id:'budget-'+c.name, icon:'🎯', kind:'budget',
      title:`${c.name} is over budget`,
      detail:`${money0(c.amount)} spent against a ${money0(b)} budget. Pulling back to plan saves ${money0(c.amount-b)}.`,
      save: c.amount-b });
  });

  return out.filter(o=>o.save>2).sort((a,b)=>b.save-a.save);
}
function opportunities(){
  const leaks=spendingLeaks();
  const ai=(S.data.savings&&S.data.savings.items||[]).map((x,i)=>({
    id:'ai-'+i, icon:'✦', kind:'swap', ai:true,
    title:`${x.buy} → ${x.alt}`, detail:x.why, save:Number(x.save)||0,
  }));
  return ai.concat(leaks);
}
function potentialMonthly(){
  const done=S.data.done||{};
  const raw=opportunities().filter(o=>!done[o.id]).reduce((a,o)=>a+o.save,0);
  const cancelled=recurring().filter(r=>r.cancelled).reduce((a,r)=>a+r.monthly,0);
  // Keep the headline honest. Suggestions overlap in practice, so cap the
  // claim at 40% of what you actually spend in a typical month — a number
  // you could plausibly hit, rather than an arithmetic sum of best cases.
  const months=[...new Set(S.data.txs.map(t=>monthKey(t.date)))];
  const avgSpend = months.length
    ? months.reduce((a,k)=>a+sumExpenses(monthTxs(k)),0)/months.length : 0;
  const opps = avgSpend>0 ? Math.min(raw, avgSpend*0.4) : raw;
  return { opps, cancelled, raw, capped: raw>opps, total:opps+cancelled };
}
function projection(key){
  if (key!==curMonthKey()) return null;
  const now=new Date(); const day=now.getDate();
  const daysIn=new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const spent=sumExpenses(monthTxs(key));
  if (day<=0) return null;
  return { projected: spent/day*daysIn, perDay: spent/day, daysIn, day };
}

// ---- income, commitments & forecast -------------------------------------
function incomeCats(){ return S.data.incomeCats || DEFAULT_INCOME_CATS; }
function incomeCatBy(name){
  return incomeCats().find(c=>c.name===name) || { name:name||'Other', color:'#5a5d78', icon:'•' };
}
function activeIncome(){ return (S.data.income||[]).filter(i=>i.active); }
function plannedIncome(){ return activeIncome().reduce((a,i)=>a+perMonth(i.amount,i.cadence),0); }

function activeRecur(){ return (S.data.recur||[]).filter(r=>r.active); }
function manualRecurMonthly(){ return activeRecur().reduce((a,r)=>a+perMonth(r.amount,r.cadence),0); }

// Auto-detected subscriptions the user hasn't cancelled and hasn't already
// entered by hand (matched on normalized name, so we never count one twice).
function autoRecurUncovered(){
  const manual = new Set(activeRecur().map(r=>normMerchant(r.name)));
  return subscriptions().filter(s=>!s.cancelled && !manual.has(normMerchant(s.name)));
}
function committedMonthly(){
  const c=committedSplit(); return c.inHistory + c.extra;
}
/* Splitting commitments matters for the forecast.
   Auto-detected subscriptions come FROM transactions, so they're already inside
   observed spending. A hand-entered bill may or may not be — rent paid by
   e-transfer from another account never shows up in an imported statement.
   Only what's genuinely in the history can be netted off it; everything else is
   real additional outflow. */
function committedSplit(){
  const seen=new Set(merchantStats().map(m=>m.key));
  let inHistory=autoRecurUncovered().reduce((a,s)=>a+s.monthly,0);
  let extra=0;
  activeRecur().forEach(r=>{
    const amt=perMonth(r.amount,r.cadence);
    if (seen.has(normMerchant(r.name))) inHistory+=amt; else extra+=amt;
  });
  return { inHistory, extra };
}

// Average real monthly spend over recent complete-ish months.
function avgMonthlySpend(n){
  const keys=[...new Set(S.data.txs.map(t=>monthKey(t.date)))].sort().reverse().slice(0, n||3);
  if (!keys.length) return 0;
  return keys.reduce((a,k)=>a+sumExpenses(monthTxs(k)),0)/keys.length;
}
function avgMonthlyIncomeObserved(n){
  const keys=[...new Set(S.data.txs.map(t=>monthKey(t.date)))].sort().reverse().slice(0, n||3);
  if (!keys.length) return 0;
  return keys.reduce((a,k)=>a+sumIncome(monthTxs(k)),0)/keys.length;
}

/* The forecast.
   Outflow is split into commitments (known, contractual) and variable spend
   (everything else, from history). Historical spending already contains the
   subscription charges, so variable is measured as observed-minus-committed
   rather than added on top — otherwise every bill would be counted twice. */
function forecast(months){
  const n = months || S.data.settings.forecastMonths || 12;
  const split     = committedSplit();
  const committed = split.inHistory + split.extra;
  const observed  = avgMonthlySpend(3);
  // Only net off the part of the commitments the history actually contains.
  const variable  = Math.max(0, observed - split.inHistory);
  const declared  = plannedIncome();
  const observedIncome = avgMonthlyIncomeObserved(3);
  const income = declared > 0 ? declared : observedIncome;

  const outflow = committed + variable;
  const net = income - outflow;
  const start = Number(S.data.settings.startingBalance) || 0;

  const points = [];
  for (let m=0; m<=n; m++) points.push({ m, balance: start + net*m });

  // If you're running a deficit, the only number that matters is how long
  // the current balance lasts.
  const runway = (net < 0 && start > 0) ? start / -net : null;

  return {
    income, declared, observedIncome, usingObserved: declared<=0 && observedIncome>0,
    committed, variable, observed, outflow, net, start, points, n, runway,
    rate: income>0 ? net/income*100 : null,
    at: (m)=> start + net*m,
  };
}

function hasKey(){ return !!S.apiKey; }
async function llm({ system, messages, max_tokens }){
  if (!S.apiKey) throw new Error('no-key');
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'content-type':'application/json',
      'x-api-key':S.apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body: JSON.stringify({ model:S.data.settings.model||'claude-haiku-4-5', max_tokens, system, messages }),
  });
  if (!r.ok){ const t=await r.text().catch(()=> ''); throw new Error('API '+r.status+' '+t.slice(0,140)); }
  const j = await r.json();
  return (j.content||[]).map(c=>c.text||'').join('').trim();
}

/* Mobile keyboards are the enemy of a pasted secret. iOS/Android "smart
   punctuation" silently swaps a plain hyphen for an en/em dash in text that
   passed through Notes, Messages, or an email client before being copied —
   invisible once masked in a password field, and a valid-looking string that
   the API will flat-out reject. Password-type inputs can also get hijacked by
   a browser's "suggest/save password" autofill with zero visible sign.
   This strips whitespace, undoes the dash swap, and rejects the couple of
   near-miss shapes that would otherwise pass a naive check.                 */
function sanitizeKey(raw){
  return String(raw||'')
    .replace(/[\u2010-\u2015\u2212]/g, '-')     // en/em/figure dash, minus sign -> hyphen
    .replace(/[\u200B-\u200D\uFEFF]/g, '')       // zero-width space/joiner/BOM from copy-paste
    .replace(/\s+/g, '');                          // any whitespace, not just the ends
}
async function saveKeyChecked(){
  const raw = ($('#key-input').value||'');
  const k = sanitizeKey(raw);
  if (!k){ toast('Paste your key first','err'); return; }

    S.ui.keyMsg={ ok:false, text:'Anthropic keys start with "sk-ant-" — this doesn\'t look like one. Get yours at console.anthropic.com.' };

  }

  S.ui.keyBusy=true; S.ui.keyMsg=null; render();
  const prevKey=S.apiKey;
  S.apiKey=k;                                   // llm() reads S.apiKey directly

    try{ localStorage.setItem(LS_APIKEY,k); }catch(e){}

      msg.startsWith('API')     ? 'Anthropic returned an error — check the key and your account at console.anthropic.com.' :
      'Could not reach Anthropic to verify — check your connection and try again.' };
  }
  S.ui.keyBusy=false; render();
}

function habitProfile(){

function readFile(f){
  return new Promise((res,rej)=>{
    const r=new FileReader(); r.onload=()=>res(String(r.result)); r.onerror=()=>rej(new Error('read')); r.readAsDataURL(f);
  });
}
async function scanFiles(files){
  if (!hasKey()){
    S.ui.screen='add'; S.ui.scan={ state:'error', pct:0, msg:'', file:'', error:'Reading screenshots needs your own Anthropic API key. Add it in Settings, or use "Add manually" / "Import CSV".', added:0, review:0 };
    render(); return;
  }

  render(); animatePct();
  const catList = catNames().join(', ');
  const today = todayISO();
  /* One prompt has to cover two very different images: a statement/screenshot
     with many rows, and a photo of a single paper receipt. The rules below tell
     the model which shape it's looking at and, critically, that a receipt is
     ONE transaction at its grand total — not one per line item. */
  const prompt =
'You are reading a financial image for a personal spending tracker. It is ONE of:\n'+
'  (A) a bank/credit-card statement or app screenshot listing MANY transactions, or\n'+
'  (B) a photo or scan of a SINGLE paper/email receipt from one merchant.\n\n'+
'Decide which, then extract accordingly.\n\n'+
'IF (A) a statement: return one object per transaction row.\n'+
'IF (B) a receipt: return EXACTLY ONE object for the whole receipt. Use the final grand\n'+
'  total actually paid — the largest total AFTER taxes, tips and discounts (look for TOTAL,\n'+
'  AMOUNT DUE, BALANCE, or the card-payment line). Do NOT return individual line items, and\n'+
'  do NOT use the subtotal. Put the store name in "merchant". If you can read a tax line\n'+
'  (GST/HST/PST/QST) put that number in "tax". Summarise notable items in "note" (max 8 words).\n\n'+
'Rules for every object:\n'+
'  "date": the transaction date as YYYY-MM-DD. Receipts often show DD/MM/YYYY or MM/DD/YYYY —\n'+
'    if ambiguous, prefer DD/MM when the day is >12. If no year is printed, infer the most\n'+
'    recent plausible year given today is '+today+'. If no date at all, use "'+today+'".\n'+
'  "amount": a POSITIVE number, digits only (no currency symbol, no thousands separator).\n'+
'  "currency": the ISO code actually printed on the image (CAD, USD, EUR...). Canadian\n'+
'    receipts showing GST/HST/PST/QST or "$" with no other marking are CAD. If genuinely\n'+
'    unknown use null — never guess a foreign currency.\n'+
'  "type": "income" for deposits, refunds, credits, payroll, e-transfers received;\n'+
'    "expense" for purchases, withdrawals, bills and fees.\n'+
'  "category": the single best fit from exactly this list: '+catList+'. Use null only if\n'+
'    genuinely unclear. Judge by what the merchant SELLS: a supermarket is Groceries even if\n'+
'    the receipt includes household items; a restaurant, cafe, bar or food delivery is Dining;\n'+
'    fuel, transit, rideshare and parking are Transport; streaming, apps and memberships are\n'+
'    Subscriptions; utilities, phone, internet, insurance and rent are Bills.\n'+
'  "tax": total sales tax as a number, or null.\n'+
'  "note": "" unless a receipt gave you something useful.\n\n'+
'Ignore anything that is not a real transaction: running balances, "available credit",\n'+
'account totals, pending-authorisation duplicates, subtotals, and change given.\n\n'+
'Return ONLY a JSON array. No prose, no explanation, no markdown code fences.\n'+
'Example: [{"date":"2026-07-14","merchant":"Loblaws","amount":84.10,"currency":"CAD",'+
'"type":"expense","category":"Groceries","tax":4.10,"note":""}]\n'+
'If you cannot read any transaction at all, return [].';
  const collected=[];

      const dataUrl = await readFile(f);
      const b64 = dataUrl.includes(',') ? dataUrl.split(',')[1] : dataUrl;
      const raw = await llm({
        max_tokens:1800,
        messages:[{ role:'user', content:[
          { type:'image', source:{ type:'base64', media_type:f.type||'image/png', data:b64 } },
          { type:'text', text:prompt },
        ]}],
      });
      parseItems(raw).forEach(x=>collected.push(x));
    }
    clearInterval(S._timer);
    if (!collected.length){
      S.ui.scan={ state:'error', pct:0, msg:'', file:'', error:"FireRaven couldn't find any transactions in that image. Make sure each row (date, merchant, amount) is clearly visible.", added:0, review:0 };
      render(); return;
    }
    S.ui.scan.pct=100; render();
    finishBatch(collected, 'scan');
  } catch(err){
    clearInterval(S._timer);
    const msg=String(err&&err.message||err);
    S.ui.scan={ state:'error', pct:0, msg:'', file:'', error:
      msg.startsWith('API 401') ? 'Your API key was rejected. Check it in Settings.' :
      msg.startsWith('API')     ? 'The AI service returned an error. Check your key and billing, then try again.' :
      'Something went wrong reading that image. Try again.', added:0, review:0 };

  }
}
function animatePct(){

function parseItems(raw){
  if (!raw) return [];
  let s=raw.trim().replace(/^```(json)?/i,'').replace(/```$/,'').trim();
  const a=s.indexOf('['), b=s.lastIndexOf(']');
  if (a===-1||b===-1) return [];
  try { const arr=JSON.parse(s.slice(a,b+1)); return Array.isArray(arr)?arr:[]; } catch(e){ return []; }
}
// turn raw AI/CSV items into transactions, with merchant learning + dedup
function finishBatch(items, source){
  const existing = new Set(S.data.txs.map(t=>t.date+'|'+normMerchant(t.merchant)+'|'+t.amount.toFixed(2)));
  let added=0, review=0, dupes=0;
  const fresh=[];
  items.forEach(x=>{
    const amount=Math.abs(Number(x&&x.amount))||0;
    if (amount<=0) return;
    const merchant=String((x&&x.merchant)||'Unknown').slice(0,60);
    const type=(x&&x.type)==='income'?'income':'expense';
    const iso=parseLooseDate(x&&x.date);
    const key=iso+'|'+normMerchant(merchant)+'|'+amount.toFixed(2);
    if (existing.has(key)){ dupes++; return; }
    existing.add(key);
    let cat = x&&x.category;
    if (cat && !catNames().includes(cat)) cat=null;
    let needsReview=false;
    if (type==='expense'){
      if (!cat){ const g=guessCategory(merchant); cat=g.cat; needsReview=!g.learned; }
    } else { cat=null; }
    if (cat) learnMerchant(merchant, cat);

    // Build the note from anything useful the scan gave us.
    const bits=[];
    if (x && x.note) bits.push(String(x.note).slice(0,60));
    if (x && Number(x.tax)>0) bits.push('tax '+money(Number(x.tax)));
    // A foreign-currency receipt would silently corrupt totals — flag, never convert.
    const ccy = x && x.currency ? String(x.currency).toUpperCase().slice(0,3) : '';
    if (ccy && ccy!==cur()){
      bits.push('⚠ amount is in '+ccy+', not '+cur());
      needsReview=true;
    }
    if (needsReview) review++;
    added++;
    fresh.push({ id:uid('b'), merchant, category:cat, amount, type, date:iso,
                 note:bits.join(' · '), needsReview, source });
  });
  S.data.txs = fresh.concat(S.data.txs);
  sortTxs();
  save();
  S.ui.scan={ state:'done', pct:100, msg:'', file:'', error:'', added, review, dupes };
  render();
}
function sortTxs(){ S.data.txs.sort((a,b)=> a.date<b.date?1 : a.date>b.date?-1 : 0); }

// ---- CSV ----------------------------------------------------------------
function parseCSV(text){
  const rows=[]; let row=[], cell='', q=false;
  for (let i=0;i<text.length;i++){
    const c=text[i];
    if (q){
      if (c==='"'){ if (text[i+1]==='"'){ cell+='"'; i++; } else q=false; }
      else cell+=c;
    } else {
      if (c==='"') q=true;
      else if (c===','){ row.push(cell); cell=''; }
      else if (c==='\n'){ row.push(cell); rows.push(row); row=[]; cell=''; }
      else if (c==='\r'){}
      else cell+=c;
    }
  }
  if (cell.length||row.length){ row.push(cell); rows.push(row); }
  return rows.filter(r=>r.some(x=>String(x).trim()!==''));
}
function csvToItems(text){
  const rows=parseCSV(text); if (!rows.length) return [];
  const header=rows[0].map(h=>h.toLowerCase().trim());
  const find=(...names)=>header.findIndex(h=>names.some(n=>h.includes(n)));
  let di=find('date','posted','transaction date');
  let mi=find('description','merchant','name','details','memo','payee');
  let ai=find('amount','value');
  const debit=find('debit','withdrawal','money out'), credit=find('credit','deposit','money in');
  let hasHeader = di>=0 || mi>=0 || ai>=0 || debit>=0 || credit>=0;
  const start = hasHeader ? 1 : 0;
  if (!hasHeader){ di=0; mi=1; ai=2; } // best-effort positional
  const items=[];
  for (let i=start;i<rows.length;i++){
    const r=rows[i]; if (!r.length) continue;
    const dateRaw = di>=0 ? r[di] : r[0];
    const merchant = mi>=0 ? r[mi] : (r[1]||'Unknown');
    let amount=0, type='expense';
    if (debit>=0 || credit>=0){
      const d=parseFloat(String(r[debit]||'').replace(/[^0-9.\-]/g,''));
      const c=parseFloat(String(r[credit]||'').replace(/[^0-9.\-]/g,''));
      if (!isNaN(c)&&c>0){ amount=c; type='income'; }
      else if (!isNaN(d)&&d>0){ amount=d; type='expense'; }
    } else if (ai>=0){
      const v=parseFloat(String(r[ai]).replace(/[^0-9.\-]/g,''));
      if (!isNaN(v)){ amount=Math.abs(v); type=v>0?'income':'expense'; }
    }
    if (amount>0) items.push({ date:dateRaw, merchant:String(merchant||'Unknown').trim(), amount, type });
  }
  return items;
}

// ---- backup / restore ---------------------------------------------------
function download(filename, text, mime){
  const blob=new Blob([text],{ type:mime||'text/plain' });
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function exportJSON(){
  download('fireraven-backup-'+todayISO()+'.json', JSON.stringify(S.data,null,2), 'application/json');
  toast('Backup downloaded','ok');
}
function exportCSV(){
  const rows=[['date','merchant','category','type','amount','note']];
  S.data.txs.forEach(t=>rows.push([t.date, t.merchant, t.category||'', t.type, t.amount.toFixed(2), t.note||'']));
  const csv=rows.map(r=>r.map(c=>{ c=String(c); return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c; }).join(',')).join('\n');
  download('fireraven-transactions-'+todayISO()+'.csv', csv, 'text/csv');
  toast('CSV exported','ok');
}
function restoreJSON(text){
  try {
    const d=JSON.parse(text);
    if (!d || !Array.isArray(d.txs)) throw new Error('bad');
    S.data=normalizeData(d); save(); render();
    toast('Backup restored — '+S.data.txs.length+' transactions','ok');
  } catch(e){ toast('That file could not be read as a FireRaven backup','err'); }
}
