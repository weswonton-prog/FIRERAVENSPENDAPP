  const filterChips=['All','Income',...catNames()].map(c=>`<button class="chip ${fc===c?'chip-on':''}" data-act="filterCat" data-arg="${esc(c)}" style="flex:none">${esc(c)}</button>`).join('');

  // group by date
  const groups={}; list.forEach(t=>{ (groups[t.date]=groups[t.date]||[]).push(t); });
  const dates=Object.keys(groups).sort().reverse();

  return `<div class="page">
    <div class="h-title">Activity</div>
    ${reviewN?`<button class="card card-tight" data-act="go" data-arg="review" style="flex-direction:row;align-items:center;gap:11px;text-align:left;background:var(--accent-900);box-shadow:inset 0 0 0 1px var(--accent-800)">
      <div class="raven" style="width:32px;height:32px"></div>
      <div class="grow"><b style="font-size:13px">${reviewN} to review</b><div class="warn" style="font-size:11px">FireRaven needs a category for these</div></div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-2)" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
    </button>`:''}
    ${monthSwitcher(key)}
    <div class="field">
      <input class="input" id="act-search" data-field="search" placeholder="Search merchant, note or category" value="${esc(S.ui.search)}">
    </div>
    <div class="chips" style="flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px">${filterChips}</div>
    <div class="between"><div class="section-label">${list.length} transaction${list.length===1?'':'s'}</div><div class="section-label">${money(spent)}</div></div>
    <div id="act-list" style="display:flex;flex-direction:column;gap:10px">
      ${dates.length ? dates.map(d=>`<div><div class="tx-sub" style="margin:2px 6px 4px;font-weight:600">${fmtDate(d)}</div>${groups[d].map(txRow).join('')}</div>`).join('')
        : `<p class="muted" style="font-size:13px;margin-top:6px">Nothing matches. ${q||fc!=='All'?'Try clearing the search or filter.':'Add transactions with the ＋ button.'}</p>`}
    </div>
  </div>`;
}

// ---- insights -----------------------------------------------------------
function viewInsights(){
  const key=selMonth();
  const list=monthTxs(key);
  const spent=sumExpenses(list);
  const t6=trend(6);
  const tmax=Math.max(...t6.map(x=>x.value),1);
  const avg=t6.reduce((a,x)=>a+x.value,0)/t6.length;
  const catList=categoryTotals(list);
  const catSum=catList.reduce((a,c)=>a+c.amount,0)||1;
  const budget=S.data.settings.monthlyBudget;
  const proj=projection(key);
  const rec=recurring();
  const recTotal=rec.reduce((a,r)=>a+r.monthly,0);

  // top merchants this month
  const byM={}; list.filter(t=>t.type!=='income').forEach(t=>byM[t.merchant]=(byM[t.merchant]||0)+t.amount);
  const topM=Object.keys(byM).map(n=>({ n, v:byM[n] })).sort((a,b)=>b.v-a.v).slice(0,4);
  const biggest=list.filter(t=>t.type!=='income').slice().sort((a,b)=>b.amount-a.amount)[0];

  const tips=buildTips(list, catList, rec);
  const cf=cashflow(key);
  const exp=list.filter(t=>t.type!=='income');
  const nTx=exp.length;
  const avgTx=nTx?spent/nTx:0;
  const dow=dowTotals(list);
  const dowMax=Math.max(...dow.map(d=>d.total),1);
  const busiest=dow.slice().sort((a,b)=>b.total-a.total)[0];
  const daily=dailyTotals(key);
  const dMax=Math.max(...daily,1);
  const isCurM=key===curMonthKey();
  const today=new Date().getDate();
  const deltas=catDeltas(key).filter(d=>Math.abs(d.delta)>1).slice(0,5);
  const noSpend=daily.filter((v,i)=>v===0 && (!isCurM || i<today)).length;
  const pot=potentialMonthly();

  return `<div class="page">
    <div class="row"><div class="h-title grow">Insights</div>
      <button class="icon-btn" data-act="go" data-arg="assistant" title="Ask FireRaven"><div class="raven" style="width:21px;height:19px"></div></button></div>
    ${monthSwitcher(key)}

    <div class="stats">
      <div class="stat"><span>Spent</span><b>${money0(spent)}</b><small>${nTx} purchase${nTx===1?'':'s'}</small></div>
      <div class="stat"><span>Income</span><b class="${cf.income>0?'income':''}">${money0(cf.income)}</b><small>${cf.rate!=null?Math.round(cf.rate)+'% kept':'none logged'}</small></div>
      <div class="stat"><span>Net</span><b class="${cf.net>=0?'good':'bad'}">${cf.net>=0?'+':'−'}${money0(Math.abs(cf.net))}</b><small>${cf.net>=0?'saved this month':'more out than in'}</small></div>
      <div class="stat"><span>Avg purchase</span><b>${money0(avgTx)}</b><small>${noSpend} no-spend day${noSpend===1?'':'s'}</small></div>
    </div>

    ${cf.income>0?`<div class="card card-tight">
      <div class="between"><div style="font-size:13px;font-weight:600">Cash flow</div>
        <div class="delta ${cf.net>=0?'down':'up'}">${cf.rate!=null?(cf.rate>=0?'saving ':'overspending ')+Math.abs(Math.round(cf.rate))+'%':''}</div></div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div><div class="between" style="font-size:11.5px;margin-bottom:4px"><span class="muted">In</span><span class="income">${money(cf.income)}</span></div>
          <div class="bar"><span style="width:100%;background:var(--income)"></span></div></div>
        <div><div class="between" style="font-size:11.5px;margin-bottom:4px"><span class="muted">Out</span><span>${money(cf.spent)}</span></div>
          <div class="bar"><span style="width:${Math.min(100,cf.income?cf.spent/cf.income*100:100).toFixed(0)}%;background:var(--accent)"></span></div></div>
      </div>
      <div class="tx-sub">${cf.net>=0?`You kept ${money0(cf.net)} of what came in.`:`You spent ${money0(-cf.net)} more than you earned this month.`}</div>
    </div>`:''}

    <div class="card">
      <div class="between"><div style="font-size:13px;font-weight:600">6-month trend</div><div style="font-size:12px" class="muted">avg ${money0(avg)}</div></div>
      <div style="display:flex;align-items:flex-end;gap:10px;height:104px">
        ${t6.map(b=>{ const on=b.key===curMonthKey(); return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end">
          <div style="width:60%;height:${Math.max(6,b.value/tmax*90).toFixed(0)}px;border-radius:4px;background:${on?'var(--accent)':'var(--accent-soft)'}"></div>
          <span style="font-size:9px;color:${on?'var(--text)':'var(--muted)'}">${b.label}</span></div>`; }).join('')}
      </div>
    </div>

    ${proj?`<div class="card card-tight">
      <div class="row"><div class="tx-ic" style="color:var(--accent-2)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3v18h18M7 14l4-4 3 3 5-6"/></svg></div>
      <div class="grow"><div style="font-size:13px;font-weight:600">On track for ${money0(proj.projected)}</div><div class="tx-sub">at ${money0(proj.perDay)}/day · day ${proj.day} of ${proj.daysIn}${budget>0?' · budget '+money0(budget):''}</div></div></div>
    </div>`:''}

    ${spent>0?`<div class="card card-tight">
      <div class="between"><div style="font-size:13px;font-weight:600">Day by day</div><div style="font-size:12px" class="muted">peak ${money0(dMax)}</div></div>
      <div class="spark">${daily.map((v,i)=>`<i class="${isCurM&&i===today-1?'today':''}" style="height:${Math.max(2,v/dMax*44).toFixed(0)}px" title="${i+1}: ${money0(v)}"></i>`).join('')}</div>
      <div class="between tx-sub"><span>1</span><span>${daily.length}</span></div>
    </div>

    <div class="card card-tight">
      <div class="between"><div style="font-size:13px;font-weight:600">Which days cost you</div><div style="font-size:12px" class="muted">${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dow.indexOf(busiest)]} is worst</div></div>
      <div class="dow">${dow.map(d=>`<div class="dow-b"><i class="${d===busiest?'hi':''}" style="height:${Math.max(3,d.total/dowMax*58).toFixed(0)}px"></i><span>${d.label}</span></div>`).join('')}</div>
      <div class="tx-sub">${money0(busiest.total)} across ${busiest.count} purchase${busiest.count===1?'':'s'} on that day.</div>
    </div>`:''}

    ${deltas.length?`<div class="card card-tight">
      <div style="font-size:13px;font-weight:600">Versus last month</div>
      ${deltas.map(d=>`<div class="row" style="gap:9px;font-size:13px">
        <span class="swatch" style="background:${d.color}"></span>
        <span class="grow nowrap">${esc(d.name)}</span>
        <span class="muted" style="font-size:12px">${money0(d.prev)} → ${money0(d.now)}</span>
        <span class="delta ${d.delta>0?'up':d.delta<0?'down':'flat'}">${d.delta>0?'▲':'▼'} ${money0(Math.abs(d.delta))}</span>
      </div>`).join('')}
    </div>`:''}

    ${catList.length?`<div style="font-size:15px;font-weight:600;margin-top:2px">Where it goes</div>
    <div style="display:flex;flex-direction:column;gap:13px">
      ${catList.map(c=>`<div style="display:flex;flex-direction:column;gap:6px">
        <div style="display:flex;align-items:center;font-size:13px"><span class="swatch" style="background:${c.color};margin-right:8px"></span>${esc(c.icon)} ${esc(c.name)}<span style="margin-left:auto" class="muted">${money(c.amount)} · ${Math.round(c.amount/catSum*100)}%</span></div>
        <div class="bar"><span style="width:${Math.max(5,c.amount/catList[0].amount*100).toFixed(0)}%;background:${c.color}"></span></div>
        ${catBudget(c.name)>0?`<div class="tx-sub" style="text-align:right;color:${c.amount>catBudget(c.name)?'var(--bad)':'var(--muted)'}">${money0(c.amount)} / ${money0(catBudget(c.name))} budget</div>`:''}
      </div>`).join('')}
    </div>`:''}

    ${topM.length?`<div class="card card-tight">
      <div style="font-size:13px;font-weight:600">Top merchants</div>
      ${topM.map(m=>`<div class="between" style="font-size:13px"><span class="nowrap">${esc(m.n)}</span><span class="muted">${money(m.v)}</span></div>`).join('')}
      ${biggest?`<hr class="rule"><div class="tx-sub">Biggest single purchase: <b>${esc(biggest.merchant)}</b> — ${money(biggest.amount)}</div>`:''}
    </div>`:''}

    ${rec.length?`<div class="card card-tight">
      <div class="between"><div style="font-size:13px;font-weight:600">Recurring & subscriptions</div><span class="tag tag-recur">${money0(recTotal)}/mo</span></div>
      ${rec.slice(0,6).map(r=>`<div class="between" style="font-size:13px"><span class="nowrap">${esc(r.name)}</span><span class="muted">${money(r.monthly)}/mo · ${money0(r.annual)}/yr</span></div>`).join('')}
      <div class="tx-sub">About ${money0(rec.reduce((a,r)=>a+r.annual,0))} a year across ${rec.length} recurring charge${rec.length===1?'':'s'}.</div>
    </div>`:''}

    <div class="sec"><div class="sec-ic">✦</div><h3>FireRaven's read</h3></div>
    <div style="display:flex;flex-direction:column;gap:11px">
      ${tips.map(text=>`<div class="card card-tight" style="flex-direction:row;gap:12px;align-items:flex-start">
        <div class="tx-ic" style="width:30px;height:30px;border-radius:9px;background:var(--accent-900);color:var(--accent-2);font-size:15px">✦</div>
        <div style="font-size:13px;line-height:1.5">${text}</div></div>`).join('')}
      ${pot.total>3?`<button class="btn btn-ghost btn-block" data-act="go" data-arg="save" style="box-shadow:inset 0 0 0 1px rgba(232,192,122,.28);color:var(--save)">See ${money0(pot.total)}/mo of savings ideas →</button>`:''}
    </div>
  </div>`;
}
function catBudget(name){ const c=cats().find(x=>x.name===name); return c&&c.budget?c.budget:0; }
function buildTips(list, catList, rec){
  const tips=[];
  const subs=rec.filter(r=>r.cat==='Subscriptions');
  if (subs.length){ const yr=subs.reduce((a,r)=>a+r.annual,0); tips.push(`Your ${subs.length} subscription${subs.length>1?'s':''} cost about ${money0(subs.reduce((a,r)=>a+r.monthly,0))}/mo — roughly <b>${money0(yr)} a year</b>. Cancelling one you rarely use is the easiest cut.`); }
  const dining=catList.find(c=>c.name==='Dining');
  if (dining){ const n=list.filter(t=>t.category==='Dining').length; tips.push(`${n} dining purchase${n===1?'':'s'} added up to ${money(dining.amount)} this month. Cooking a couple at home would save around <b>${money0(dining.amount*0.3)}</b>.`); }
  const byM={}; list.filter(t=>t.type!=='income').forEach(t=>byM[t.merchant]=(byM[t.merchant]||0)+t.amount);
  const top=Object.keys(byM).sort((a,b)=>byM[b]-byM[a])[0];
  if (top){ tips.push(`${esc(top)} is your single largest spend at <b>${money(byM[top])}</b>. Worth a check that it was planned.`); }
  if (!tips.length) tips.push("Add a few transactions and I'll find specific ways to save from your real spending.");
  return tips.slice(0,3);
}

// ---- save money hub -----------------------------------------------------
function viewSave(){
  const tab=S.ui.saveTab;
  const f=forecast();
  const seg=(k,l)=>`<button class="${tab===k?'on':''}" data-act="saveTab" data-arg="${k}">${l}</button>`;

  return `<div class="page">
    <div class="row">
      <div class="h-title grow">Plan</div>
      <button class="icon-btn" data-act="go" data-arg="assistant" title="Ask FireRaven"><div class="raven" style="width:21px;height:19px"></div></button>
    </div>

    <div class="hero ${f.net>=0?'hero-save':'hero-spend'}">
      <div>
        <div class="section-label" style="color:${f.net>=0?'var(--save)':'var(--bad)'}">${f.net>=0?'Keeping each month':'Short each month'}</div>
        <div class="kpi" style="margin-top:4px">${f.net>=0?'':'−'}${money0(Math.abs(f.net))}<span style="font-size:16px;font-weight:600;color:var(--muted)">/mo</span></div>
        <div style="font-size:12.5px;margin-top:3px" class="muted">
          ${f.income>0
            ? `${money0(f.income)} in · ${money0(f.outflow)} out${f.rate!=null?` · ${Math.round(f.rate)}% kept`:''}`
            : 'add your income to see the full picture'}
        </div>
      </div>
    </div>

    <div class="seg">${seg('forecast','Forecast')}${seg('income','Income')}${seg('subs','Recurring')}${seg('ideas','Save')}</div>

    ${tab==='forecast'?planForecast(f):tab==='income'?planIncome():tab==='subs'?saveSubs():planSave()}
  </div>`;
}

// ── Forecast ─────────────────────────────────────────────────────────────
function planForecast(f){
  const st=S.data.settings;
  const goal=st.savingsGoal||0;
  if (f.income<=0 && f.outflow<=0) return `<div class="card"><div class="muted" style="font-size:13px;line-height:1.55">
    FireRaven needs two things to forecast: what comes in, and what goes out. Add your income under the <b>Income</b> tab, and import a month or two of spending — the projection appears here automatically.</div>
    <button class="btn btn-primary btn-block" data-act="saveTab" data-arg="income">Add my income</button></div>`;

  const n=f.n;
  const vals=f.points.map(p=>p.balance);
  const lo=Math.min(...vals,0), hi=Math.max(...vals,0);
  const span=(hi-lo)||1;
  const H=104;
  const pts=f.points.map((p,i)=>`${(i/(n)*100).toFixed(2)},${(H-((p.balance-lo)/span*H)).toFixed(2)}`).join(' ');
  const zeroY=(H-((0-lo)/span*H)).toFixed(2);
  const milestone=(m)=>`<div class="stat"><span>In ${m} month${m===1?'':'s'}</span><b class="${f.at(m)>=0?'':'bad'}">${f.at(m)<0?'−':''}${money0(Math.abs(f.at(m)))}</b><small>${fmtFuture(m)}</small></div>`;

  return `
    <div class="card">
      <div class="between"><div style="font-size:13px;font-weight:600">Projected balance</div>
        <div class="muted" style="font-size:12px">next ${n} months</div></div>
      <svg viewBox="0 0 100 ${H}" preserveAspectRatio="none" style="width:100%;height:118px;overflow:visible">
        <defs><linearGradient id="fgrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${f.net>=0?'#e8c07a':'#f0a6a6'}" stop-opacity=".32"/>
          <stop offset="100%" stop-color="${f.net>=0?'#e8c07a':'#f0a6a6'}" stop-opacity="0"/>
        </linearGradient></defs>
        ${lo<0?`<line x1="0" y1="${zeroY}" x2="100" y2="${zeroY}" stroke="#f0a6a6" stroke-width=".5" stroke-dasharray="2 2" vector-effect="non-scaling-stroke"/>`:''}
        <polygon points="0,${H} ${pts} 100,${H}" fill="url(#fgrad)"/>
        <polyline points="${pts}" fill="none" stroke="${f.net>=0?'#e8c07a':'#f0a6a6'}" stroke-width="2" vector-effect="non-scaling-stroke" stroke-linejoin="round"/>
      </svg>
      <div class="between tx-sub"><span>now · ${money0(f.start)}</span><span>${fmtFuture(n)} · ${money0(f.at(n))}</span></div>
    </div>

    <div class="stats">${milestone(3)}${milestone(6)}${milestone(12)}
      <div class="stat"><span>Savings rate</span><b class="${f.net>=0?'good':'bad'}">${f.rate!=null?Math.round(f.rate)+'%':'—'}</b><small>of income kept</small></div>
    </div>

    ${f.runway!=null?`<div class="opp" style="box-shadow:inset 0 0 0 1px rgba(240,166,166,.3)">
      <div class="opp-ic" style="background:#2b2028;color:var(--bad)">⚠</div>
      <div class="grow"><div style="font-size:13.5px;font-weight:650">About ${f.runway.toFixed(1)} months of runway</div>
        <div class="tx-sub">At ${money0(-f.net)}/mo short, your ${money0(f.start)} balance runs out around ${fmtFuture(Math.floor(f.runway))}. Cutting ${money0(-f.net)}/mo breaks even.</div></div>
    </div>`:''}

    ${goal>0&&f.net>0?`<div class="opp"><div class="opp-ic">🎯</div><div class="grow">
      <div style="font-size:13.5px;font-weight:650">${f.net>=goal?'You\'re beating your goal':`${money0(goal-f.net)}/mo short of your goal`}</div>
      <div class="tx-sub">Goal is ${money0(goal)}/mo; you're on track for ${money0(f.net)}/mo. ${f.net>=goal?`That's ${money0(f.net*12)} a year.`:`The Save tab has ${money0(potentialMonthly().total)}/mo of ideas.`}</div></div></div>`:''}

    <div class="card card-tight">
      <div style="font-size:13px;font-weight:600">How this is built</div>
      ${fRow('Income', f.income, f.usingObserved?'averaged from your transactions':'from your Income tab', 'income')}
      <hr class="rule">
      ${fRow('Commitments', -f.committed, 'subscriptions & recurring bills', 'bad')}
      <hr class="rule">
      ${fRow('Everyday spending', -f.variable, 'average of your last 3 months, minus commitments', 'bad')}
      <hr class="rule">
      ${fRow(f.net>=0?'Left over':'Shortfall', f.net, 'each month', f.net>=0?'good':'bad')}
      <hr class="rule">
      ${setRow('Starting balance', money0(f.start), 'editBalance')}
      ${setRow('Forecast length', f.n+' months', 'editHorizon')}
    </div>
    <div class="faint" style="font-size:11.5px;line-height:1.55">A straight-line projection: it assumes your income and habits hold steady. It can't know about a raise, a move, or a big one-off — treat it as a trajectory, not a promise.</div>
  `;
}
function fRow(label, amount, sub, tone){
  const cls = tone==='good'?'good':tone==='bad'?'':'';
  return `<div class="row" style="padding:9px 0;gap:10px">
    <div class="grow"><div style="font-size:13.5px">${label}</div><div class="tx-sub">${sub}</div></div>
    <div style="font-size:14px;font-weight:650;white-space:nowrap" class="${amount>=0?(tone==='good'?'good':'income'):''}">${amount<0?'−':'+'}${money0(Math.abs(amount))}</div>
  </div>`;
}
function fmtFuture(m){
  const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+m);
  return MON_SHORT[d.getMonth()]+' '+String(d.getFullYear()).slice(2);
}

// ── Income ───────────────────────────────────────────────────────────────
function planIncome(){
  const list=S.data.income||[];
  const total=plannedIncome();
  const observed=avgMonthlyIncomeObserved(3);
  const byCat={};
  list.filter(i=>i.active).forEach(i=>{ const c=i.category||'Other'; byCat[c]=(byCat[c]||0)+perMonth(i.amount,i.cadence); });
  const cats=Object.keys(byCat).map(n=>({ name:n, amount:byCat[n], color:incomeCatBy(n).color, icon:incomeCatBy(n).icon }))
    .sort((a,b)=>b.amount-a.amount);

  return `
    <div class="stats">
      <div class="stat"><span>Monthly income</span><b class="income">${money0(total)}</b><small>${list.filter(i=>i.active).length} source${list.filter(i=>i.active).length===1?'':'s'}</small></div>
      <div class="stat"><span>Per year</span><b>${money0(total*12)}</b><small>before tax changes</small></div>
    </div>

    ${observed>0 && total>0 && Math.abs(observed-total)/Math.max(observed,total)>0.15?`
    <div class="opp" style="box-shadow:inset 0 0 0 1px rgba(245,166,35,.28)">
      <div class="opp-ic" style="background:#332b1a;color:var(--warn)">≠</div>
      <div class="grow"><div style="font-size:13.5px;font-weight:650">Your deposits don't match what's declared</div>
      <div class="tx-sub">You've entered ${money0(total)}/mo here, but your actual deposits average ${money0(observed)}/mo. Worth checking which is right — the forecast uses what you declare.</div></div>
    </div>`:''}

    ${cats.length?`<div class="card card-tight">
      <div style="font-size:13px;font-weight:600">By category</div>
      ${cats.map(c=>`<div style="display:flex;flex-direction:column;gap:6px">
        <div style="display:flex;align-items:center;font-size:13px"><span class="swatch" style="background:${c.color};margin-right:8px"></span>${esc(c.icon)} ${esc(c.name)}<span style="margin-left:auto" class="muted">${money0(c.amount)}/mo · ${Math.round(c.amount/total*100)}%</span></div>
        <div class="bar"><span style="width:${Math.max(5,c.amount/cats[0].amount*100).toFixed(0)}%;background:${c.color}"></span></div>
      </div>`).join('')}
    </div>`:''}

    ${list.length?`<div class="card" style="gap:0;padding:4px 15px">
      ${list.map(i=>`<div class="sub ${i.active?'':'off'}" data-act="editStream" data-arg="income::${i.id}" style="cursor:pointer">
        <div class="tx-ic" style="width:36px;height:36px;background:${incomeCatBy(i.category).color}22;color:${incomeCatBy(i.category).color};font-size:16px">${esc(incomeCatBy(i.category).icon)}</div>
        <div class="grow"><div class="sub-name nowrap" style="font-size:13.5px;font-weight:600">${esc(i.name)}</div>
          <div class="tx-sub">${money(i.amount)} · ${cadenceLabel(i.cadence)}${i.active?` → ${money0(perMonth(i.amount,i.cadence))}/mo`:' · paused'}</div></div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--faint)" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
      </div>`).join('')}
    </div>`:`<div class="card"><div class="muted" style="font-size:13px;line-height:1.55">No income sources yet. Add your paycheque — and anything else that comes in regularly — and FireRaven can forecast what you'll actually keep.</div></div>`}

    <button class="btn btn-primary btn-block" data-act="newStream" data-arg="income">＋ Add income source</button>
    <button class="btn btn-ghost btn-block" data-act="go" data-arg="incomecats" style="font-size:13px">Manage income categories</button>
  `;
}

// ── Save (ideas + habits merged) ─────────────────────────────────────────
function planSave(){
  const pot=potentialMonthly();
  return `
    <div class="hero hero-save" style="padding:15px">
      <div><div class="section-label" style="color:var(--save)">Potential savings</div>
      <div style="font-size:27px;font-weight:700;letter-spacing:-.02em;margin-top:2px">${money0(pot.total)}<span style="font-size:14px;font-weight:600;color:var(--muted)">/mo</span></div>
      <div style="font-size:12px;margin-top:2px" class="muted">${pot.total>0?`about ${money0(pot.total*12)} a year`:'add more transactions and I\'ll find the slack'}</div></div>
    </div>
    ${saveIdeas()}
    <div class="sec"><div class="sec-ic">🔍</div><h3>Where money leaks</h3></div>
    ${saveLeaks()}
  `;
}

// Tab 1 — AI cheaper alternatives.
function saveIdeas(){
  const sv=S.data.savings;
  const items=(sv&&sv.items)||[];
  const done=S.data.done||{};
  const busy=S.ui.aiBusy;
  return `
    <div class="card" style="gap:11px">
      <div class="row" style="gap:11px">
        <div class="raven" style="width:34px;height:34px"></div>
        <div class="grow"><div style="font-size:13.5px;font-weight:650">Cheaper versions of what you already buy</div>
          <div class="tx-sub">FireRaven reads your repeat purchases and finds like-for-like swaps.</div></div>
      </div>
      <button class="btn btn-primary btn-block" data-act="findCheaper" ${busy?'disabled':''}>
        ${busy?'<span class="typing"><i></i><i></i><i></i></span> Looking for swaps…':(items.length?'Refresh suggestions':'Find cheaper alternatives')}</button>
      ${!hasKey()?`<div class="faint" style="font-size:11px;line-height:1.5">No API key set — you'll get FireRaven's built-in rules. <button class="link" data-act="go" data-arg="settings">Add a key</button> for suggestions tailored to your exact merchants.</div>`:''}
      ${sv&&sv.at?`<div class="faint" style="font-size:11px">${sv.local?'Built-in rules':'Generated by FireRaven'} · ${fmtDate(isoFrom(new Date(sv.at)))}</div>`:''}
    </div>

    ${items.length?items.map((x,i)=>{
      const id='ai-'+i, off=!!done[id];
      return `<div class="opp ${off?'done':''}">
        <div class="opp-ic">✦</div>
        <div class="grow" style="display:flex;flex-direction:column;gap:5px">
          <div class="between" style="gap:10px;align-items:flex-start">
            <div class="opp-title" style="font-size:13.5px;font-weight:650;line-height:1.35">${esc(x.buy)}<span class="faint"> → </span>${esc(x.alt)}</div>
            ${x.save>0?`<div class="opp-amt">${money0(x.save)}/mo</div>`:''}
          </div>
          <div style="font-size:12.5px;line-height:1.5" class="muted">${esc(x.why)}</div>
          <div class="row" style="gap:8px;margin-top:3px">
            <button class="btn-mini ${off?'on':''}" data-act="oppDone" data-arg="${id}">${off?'✓ Doing this':'I\'ll try this'}</button>
            ${x.save>0?`<span class="faint" style="font-size:11px">${money0(x.save*12)}/yr</span>`:''}
          </div>
        </div>
      </div>`;
    }).join(''):`<div class="card card-tight"><div class="muted" style="font-size:13px;line-height:1.55">Nothing yet. Tap <b>Find cheaper alternatives</b> and FireRaven will look at what you buy over and over — coffee runs, delivery, streaming, groceries — and suggest specific swaps that cost less for the same thing.</div></div>`}
  `;
}

// Tab 2 — subscription manager.
function saveSubs(){
  const subs=subscriptions();
  const active=subs.filter(s=>!s.cancelled);
  const off=subs.filter(s=>s.cancelled);
  const mo=active.reduce((a,s)=>a+s.monthly,0);
  const saved=off.reduce((a,s)=>a+s.monthly,0);
  const regs=regulars();
  const regMo=regs.reduce((a,r)=>a+r.monthly,0);

  // Bills you've entered by hand — these are authoritative and drive the forecast.
  const man=S.data.recur||[];
  const manMo=manualRecurMonthly();
  const manBlock = `
    <div class="sec"><div class="sec-ic">📌</div><h3>Your recurring bills</h3></div>
    <p class="muted" style="font-size:12.5px;margin-top:-2px">Entered by you, so nothing depends on FireRaven spotting it. These drive the forecast: <b>${money0(manMo)}/mo</b>.</p>
    ${man.length?`<div class="card" style="gap:0;padding:4px 15px">
      ${man.map(r=>`<div class="sub ${r.active?'':'off'}" data-act="editStream" data-arg="recur::${r.id}" style="cursor:pointer">
        <div class="tx-ic" style="width:36px;height:36px;background:${catBy(r.category).color}22;color:${catBy(r.category).color};font-size:16px">${esc(catBy(r.category).icon)}</div>
        <div class="grow"><div class="sub-name nowrap" style="font-size:13.5px;font-weight:600">${esc(r.name)}</div>
          <div class="tx-sub">${money(r.amount)} · ${cadenceLabel(r.cadence)}${r.active?` → ${money0(perMonth(r.amount,r.cadence))}/mo`:' · paused'}${r.nextDate?` · next ${fmtDate(r.nextDate)}`:''}</div></div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--faint)" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
      </div>`).join('')}
    </div>`:`<div class="card card-tight"><div class="muted" style="font-size:13px;line-height:1.55">Nothing added yet. Add rent, insurance, phone, gym — anything that bills on a schedule. You can set any cadence, from weekly to yearly.</div></div>`}
    <button class="btn btn-primary btn-block" data-act="newStream" data-arg="recur">＋ Add recurring bill</button>`;

  const regBlock = regs.length?`
    <div class="sec"><div class="sec-ic">🔄</div><h3>Regular merchants</h3></div>
    <p class="muted" style="font-size:12.5px;margin-top:-2px">Places you buy from most months. Not subscriptions — you can't cancel them — but they're where your steady money goes: <b>${money0(regMo)}/mo</b>.</p>
    <div class="card" style="gap:0;padding:4px 15px">
      ${regs.map(r=>`<div class="sub">
        <div class="tx-ic" style="width:36px;height:36px;background:${catBy(r.cat).color}22;color:${catBy(r.cat).color};font-size:16px">${esc(catBy(r.cat).icon)}</div>
        <div class="grow"><div class="nowrap" style="font-size:13.5px;font-weight:600">${esc(r.name)}</div>
          <div class="tx-sub">${money0(r.monthly)}/mo avg · ${r.count} visit${r.count===1?'':'s'} over ${r.nMonths} month${r.nMonths===1?'':'s'}</div></div>
        <div class="muted" style="font-size:12px">${money0(r.annual)}/yr</div>
      </div>`).join('')}
    </div>`:'';

  if (!subs.length) return `${manBlock}
    <div class="sec"><div class="sec-ic">🔁</div><h3>Auto-detected</h3></div>
    <div class="card"><div class="muted" style="font-size:13px;line-height:1.55">Nothing detected from your transactions yet. FireRaven counts something as a subscription when it's a recognised service or a steady monthly bill — not just a shop you visit often.</div></div>${regBlock}`;

  const row=(s)=>`<div class="sub ${s.cancelled?'off':''}">
    <div class="tx-ic" style="width:36px;height:36px;background:${catBy(s.cat).color}22;color:${catBy(s.cat).color};font-size:16px">${esc(catBy(s.cat).icon)}</div>
    <div class="grow">
      <div class="sub-name nowrap" style="font-size:13.5px;font-weight:600">${esc(s.name)}</div>
      <div class="tx-sub">${money(s.monthly)}/mo · ${money0(s.annual)}/yr${s.cancelled?'':` · next ≈ ${fmtDate(s.next)}`}</div>
    </div>
    <button class="btn-mini ${s.cancelled?'on':''}" data-act="subToggle" data-arg="${esc(s.key)}">${s.cancelled?'Cancelled':'Cancel'}</button>
  </div>`;

  return `
    <div class="stats">
      <div class="stat"><span>Committed</span><b>${money0(committedMonthly())}<small style="font-size:12px">/mo</small></b><small>bills + subscriptions</small></div>
      <div class="stat"><span>Yearly cost</span><b>${money0(committedMonthly()*12)}</b><small>if nothing changes</small></div>
    </div>
    ${manBlock}
    <div class="sec"><div class="sec-ic">🔁</div><h3>Auto-detected subscriptions</h3></div>
    <p class="muted" style="font-size:12.5px;margin-top:-2px">Spotted in your transactions — ${money0(mo)}/mo across ${active.length} charge${active.length===1?'':'s'}. Anything you also added by hand above is only counted once.</p>
    ${saved>0?`<div class="opp"><div class="opp-ic">✓</div><div class="grow"><div style="font-size:13.5px;font-weight:650">${money0(saved)}/mo marked cancelled</div><div class="tx-sub">${money0(saved*12)} a year back in your pocket — once you've actually cancelled them.</div></div></div>`:''}
    <div class="card" style="gap:0;padding:4px 15px">
      ${active.map(row).join('')||`<div class="muted" style="font-size:13px;padding:12px 0">Everything's cancelled. Impressive.</div>`}
    </div>
    ${off.length?`<div class="section-label">Marked cancelled</div><div class="card" style="gap:0;padding:4px 15px">${off.map(row).join('')}</div>`:''}
    <div class="faint" style="font-size:11.5px;line-height:1.55">Marking one "Cancelled" here only tracks your intent — you still need to cancel it with the provider. FireRaven will stop counting it toward your monthly total.</div>
    ${regBlock}
  `;
}

// Tab 3 — habits & leaks.
function saveLeaks(){
  const done=S.data.done||{};
  const leaks=spendingLeaks();
  if (!leaks.length) return `<div class="card"><div class="muted" style="font-size:13px;line-height:1.55">No obvious leaks right now — either your spending is tight or there isn't enough history yet. Import a couple more months and FireRaven will compare them.</div></div>`;
  const kindLabel={ habit:'Habit', subscription:'Subscription', trend:'Trend', waste:'Waste', budget:'Budget' };
  return leaks.map(o=>{
    const offd=!!done[o.id];
    return `<div class="opp ${offd?'done':''}">
      <div class="opp-ic">${o.icon}</div>
      <div class="grow" style="display:flex;flex-direction:column;gap:5px">
        <div class="between" style="gap:10px;align-items:flex-start">
          <div class="opp-title" style="font-size:13.5px;font-weight:650;line-height:1.35">${esc(o.title)}</div>
          <div class="opp-amt">${money0(o.save)}/mo</div>
        </div>
        <div style="font-size:12.5px;line-height:1.5" class="muted">${o.detail}</div>
        <div class="row" style="gap:8px;margin-top:3px">
          <button class="btn-mini ${offd?'on':''}" data-act="oppDone" data-arg="${esc(o.id)}">${offd?'✓ Handled':'Mark handled'}</button>
          <span class="chip chip-sm" style="pointer-events:none">${kindLabel[o.kind]||o.kind}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

      <input class="input" id="chat-input" placeholder="Ask FireRaven about your money…" style="border-radius:999px" value="${esc(S.ui.draft)}">
      <button class="btn btn-primary" data-act="send" style="border-radius:50%;width:44px;height:44px;padding:0;flex:none"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg></button>

}

// ---- review inbox -------------------------------------------------------
function viewReview(){
  const queue=S.data.txs.filter(t=>t.needsReview);
  return `<div class="page nonav">
    <div class="row"><button class="icon-btn" data-act="go" data-arg="home" style="width:34px;height:34px"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 6l-6 6 6 6"/></svg></button><div class="h-title grow">Needs review</div>${queue.length?`<span class="tag tag-new" style="font-size:12px;padding:4px 10px">${queue.length}</span>`:''}</div>
    <p class="muted" style="font-size:13px">FireRaven couldn't confidently match these. Pick a category and confirm — it'll remember the merchant next time.</p>
    ${queue.length ? `<div style="display:flex;flex-direction:column;gap:14px">${queue.map(reviewCard).join('')}</div>`
      : `<div class="empty"><div class="raven" style="width:80px;height:80px"></div><div><div style="font-size:18px;font-weight:600;color:var(--text)">All caught up</div><p style="font-size:13px;margin-top:6px">Every purchase is categorized. Import more and FireRaven will flag anything unclear here.</p></div><button class="btn btn-ghost" data-act="openAdd">Add transactions</button></div>`}
  </div>`;
}
function reviewCard(t){
  const sel=S.ui.reviewSel[t.id]||guessCategory(t.merchant).cat||'Groceries';
  return `<div class="card">
    <div class="row">
      <div class="tx-ic" style="color:var(--muted)">?</div>
      <div class="grow"><div style="font-size:15px;font-weight:600" class="nowrap">${esc(t.merchant)}</div><div class="tx-sub">${fmtDate(t.date)} · ${t.source==='scan'?'from screenshot':t.source==='import'?'imported':'added'}</div></div>
      <div style="font-size:16px;font-weight:600">−${money(t.amount)}</div>
    </div>
    <div class="warn" style="font-size:11px;display:flex;align-items:center;gap:6px">✦ Best guess: ${esc(sel)}</div>
    <div class="chips">${catNames().map(c=>`<button class="chip ${sel===c?'chip-on':''}" data-act="reviewSel" data-arg="${t.id}::${esc(c)}">${esc(c)}</button>`).join('')}</div>
    <div class="row" style="gap:9px">
      <button class="btn btn-primary grow" data-act="reviewConfirm" data-arg="${t.id}">Confirm category</button>
      <button class="btn btn-danger" data-act="reviewDelete" data-arg="${t.id}">Delete</button>
    </div>
  </div>`;
}

// ---- add / scan ---------------------------------------------------------
function viewAdd(){
  const sc=S.ui.scan;
  if (sc.state==='processing'){
    return `<div class="page nonav" style="justify-content:center;align-items:center;text-align:center;gap:24px">
      <div style="position:relative;width:130px;height:130px;display:flex;align-items:center;justify-content:center"><div class="glow" style="width:120px;height:120px"></div><div class="raven" style="width:104px;height:104px;position:relative;animation:pulse 1.2s ease-in-out infinite"></div></div>
      <div><div style="font-size:19px;font-weight:600" id="scan-msg">${sc.msg}</div><div class="muted" style="font-size:13px;margin-top:6px">${esc(sc.file)}</div></div>
      <div style="width:220px"><div class="bar"><span id="scan-bar" style="width:${sc.pct}%;background:var(--accent)"></span></div><div class="muted" style="font-size:11px;margin-top:7px" id="scan-pct">${sc.pct}%</div></div>
    </div>`;
  }
  if (sc.state==='done'){
    return `<div class="page nonav" style="justify-content:center;align-items:center;text-align:center;gap:20px">
      <div style="width:70px;height:70px;border-radius:20px;background:linear-gradient(135deg,var(--accent),#5d5294);display:flex;align-items:center;justify-content:center"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#161826" stroke-width="2.2"><path d="M20 6L9 17l-5-5"/></svg></div>
      <div><div style="font-size:22px;font-weight:600">${sc.added} transaction${sc.added===1?'':'s'} added</div>
        <p class="muted" style="font-size:14px;margin-top:8px">FireRaven categorized them.${sc.review?` <b class="warn">${sc.review} need your review.</b>`:''}${sc.dupes?` <span class="faint">${sc.dupes} duplicate${sc.dupes===1?'':'s'} skipped.</span>`:''}</p></div>
      <div style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px">
        ${sc.review?`<button class="btn btn-primary btn-block" data-act="go" data-arg="review">Review ${sc.review} now</button>`:''}
        <button class="btn btn-ghost btn-block" data-act="go" data-arg="activity">See activity</button>
      </div>
    </div>`;
  }
  if (sc.state==='error'){
    return `<div class="page nonav" style="justify-content:center;align-items:center;text-align:center;gap:18px">
      <div style="width:64px;height:64px;border-radius:18px;background:#2b2028;display:flex;align-items:center;justify-content:center;color:var(--bad)"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg></div>
      <div><div style="font-size:18px;font-weight:600">Couldn't read that</div><p class="muted" style="font-size:13px;margin-top:8px;max-width:280px">${esc(sc.error)}</p></div>
      <button class="btn btn-ghost" data-act="openAdd">Try again</button>
    </div>`;
  }
  // idle
  const tab=S.ui.addTab;
  const tabBtn=(k,l)=>`<button class="chip ${tab===k?'chip-on':''}" data-act="addTab" data-arg="${k}" style="flex:1;justify-content:center;padding:10px">${l}</button>`;
  return `<div class="page nonav">
    <div class="between"><span></span><button class="icon-btn" data-act="go" data-arg="home"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
    <div style="text-align:center"><h2 style="font-size:24px;margin-bottom:6px">Add transactions</h2><p class="muted" style="font-size:14px;max-width:300px;margin:0 auto">Snap a screenshot, import a CSV, or type one in by hand.</p></div>
    <div class="row" style="gap:8px">${tabBtn('upload','Screenshot')}${tabBtn('manual','Manual')}${tabBtn('csv','CSV')}</div>
    ${tab==='upload'?addUpload():tab==='csv'?addCSV():addManual()}
  </div>`;
}
function addUpload(){
  return `<div>
    <div style="margin:20px 0;border:1.5px dashed var(--accent-800);border-radius:18px;padding:26px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;background:var(--surface-2)">
      <div style="position:relative;width:80px;height:80px;display:flex;align-items:center;justify-content:center"><div class="glow" style="width:80px;height:80px"></div><div class="raven" style="width:72px;height:72px;position:relative"></div></div>
      <div style="font-size:13px" class="muted">A bank/card screenshot with many rows, or a photo of a single receipt — FireRaven works out which it's looking at. Pick several at once if you like.</div>
    </div>
    <button class="btn btn-primary btn-block" data-act="snapReceipt" style="font-size:15px;padding:13px;margin-bottom:10px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>Take a photo of a receipt</button>
    <button class="btn btn-ghost btn-block" data-act="pickImage" style="font-size:15px;padding:13px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>Choose image(s) from library</button>
    ${!hasKey()?`<p class="muted" style="font-size:12px;text-align:center;margin-top:12px">Reading screenshots needs your Anthropic key. <button class="link" data-act="go" data-arg="settings">Add it in Settings</button> — or use Manual / CSV.</p>`:''}
  </div>`;
}
function addManual(){
  const a=S.ui.add;
  const typeBtn=(k,l)=>`<button class="chip ${a.type===k?'chip-on':''}" data-act="addType" data-arg="${k}" style="flex:1;justify-content:center">${l}</button>`;
  return `<div style="display:flex;flex-direction:column;gap:14px;margin-top:6px">
    <div class="row" style="gap:8px">${typeBtn('expense','Expense')}${typeBtn('income','Income')}</div>
    <div class="field"><label>Merchant / source</label><input class="input" id="m-merchant" placeholder="e.g. Loblaws" value="${esc(a.merchant)}"></div>
    <div class="field"><label>Amount (${cur()})</label><input class="input" id="m-amount" placeholder="0.00" inputmode="decimal" value="${esc(a.amount)}"></div>
    <div class="field"><label>Date</label><input class="input" id="m-date" type="date" value="${esc(a.date||todayISO())}"></div>
    ${a.type==='expense'?`<div class="field"><label>Category</label><div class="chips">${catNames().map(c=>`<button class="chip ${a.cat===c?'chip-on':''}" data-act="addCat" data-arg="${esc(c)}">${esc(catBy(c).icon)} ${esc(c)}</button>`).join('')}</div></div>`:''}
    <div class="field"><label>Note (optional)</label><input class="input" id="m-note" placeholder="Anything to remember" value="${esc(a.note)}"></div>
    <button class="btn btn-primary btn-block" data-act="addManual" style="padding:13px;margin-top:2px">Add transaction</button>
  </div>`;
}
function addCSV(){
  return `<div style="display:flex;flex-direction:column;gap:14px;margin-top:6px">
    <p class="muted" style="font-size:13px">Paste rows from your bank's CSV export (or the whole file). FireRaven looks for Date, Description and Amount columns — debit/credit columns work too. No API key needed.</p>
    <textarea class="input" id="csv-text" style="min-height:150px;font-family:ui-monospace,monospace;font-size:12px" placeholder="Date,Description,Amount&#10;2025-10-18,LOBLAWS,-84.10&#10;2025-10-18,PAYROLL,2100.00"></textarea>

    <button class="btn btn-ghost btn-block" data-act="pickCSV">Choose a .csv file</button>

function toggle(on, act){
  return `<button data-act="${act}" style="width:44px;height:26px;border-radius:13px;background:${on?'var(--accent)':'var(--accent-soft)'};position:relative;flex:none;border:0;cursor:pointer;transition:background .15s"><span style="position:absolute;top:3px;${on?'right:3px':'left:3px'};width:20px;height:20px;border-radius:50%;background:#161826;transition:all .15s"></span></button>`;
}
function setRow(label, value, act, arg){
  return `<button class="row" data-act="${act}" ${arg?`data-arg="${arg}"`:''} style="width:100%;padding:13px 2px;text-align:left;background:0;border:0">
    <span class="grow" style="font-size:14px">${label}</span><span class="muted" style="font-size:13px">${value}</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--faint)" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg></button>`;
}

// ---- income categories manager ------------------------------------------
function viewIncomeCats(){
  const byCat={};
  (S.data.income||[]).filter(i=>i.active).forEach(i=>{ const c=i.category||'Other'; byCat[c]=(byCat[c]||0)+perMonth(i.amount,i.cadence); });
  return `<div class="page nonav">
    <div class="row"><button class="icon-btn" data-act="go" data-arg="save" style="width:34px;height:34px"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 6l-6 6 6 6"/></svg></button>
      <div class="h-title grow">Income categories</div>
      <button class="icon-btn" data-act="incNew"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button></div>
    <p class="muted" style="font-size:13px">Group your income however makes sense — salary, freelance, rental, dividends. Each source you add gets filed under one of these.</p>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${incomeCats().map(c=>`<div class="card card-tight" style="flex-direction:row;align-items:center;gap:12px" data-act="incEdit" data-arg="${esc(c.name)}">
        <div class="tx-ic" style="background:${c.color}22;color:${c.color}">${esc(c.icon)}</div>
        <div class="grow"><div style="font-size:14px;font-weight:600">${esc(c.name)}</div>
          <div class="tx-sub">${byCat[c.name]?money0(byCat[c.name])+'/mo':'nothing assigned'}</div></div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--faint)" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
      </div>`).join('')}

// ---- modals -------------------------------------------------------------
function modalView(m){
  if (m.kind==='editTx') return editTxModal(m.id);
  if (m.kind==='number') return numberModal(m);
  if (m.kind==='currency') return currencyModal();
  if (m.kind==='category') return categoryModal(m);
  if (m.kind==='autolock') return autoLockModal();
  if (m.kind==='stream') return streamModal(m);
  if (m.kind==='confirm') return confirmSheet(m);
  return '';
}

/* An in-app confirmation sheet.
   window.confirm() is unreliable in installed PWAs — browsers may suppress it
   and return false, which silently cancels the action. Destructive operations
   must never depend on it. */
function confirmSheet(m){
  return `<div class="overlay" data-act="closeModal"><div class="sheet" data-stop="1">
    <div class="row" style="gap:12px;align-items:flex-start">
      <div class="tx-ic" style="background:#2b2028;color:var(--bad);font-size:18px;flex:none">${m.icon||'⚠'}</div>
      <div class="grow"><div class="h-title" style="font-size:18px">${esc(m.title)}</div></div>
    </div>
    <p class="muted" style="font-size:13.5px;line-height:1.55">${m.body}</p>
    ${m.typeToConfirm?`<div class="field"><label>Type <b>${esc(m.typeToConfirm)}</b> to confirm</label>
      <input class="input" id="confirm-text" autocapitalize="characters" placeholder="${esc(m.typeToConfirm)}"></div>`:''}
    <div class="row" style="gap:10px;margin-top:2px">
      <button class="btn btn-ghost grow" data-act="closeModal">Cancel</button>
      <button class="btn btn-danger grow" data-act="confirmYes">${esc(m.label||'Delete')}</button>
    </div>
  </div></div>`;
}

function streamModal(m){
  const isIncome = m.which==='income';
  const list = isIncome ? (S.data.income||[]) : (S.data.recur||[]);
  const existing = m.id ? list.find(x=>x.id===m.id) : null;
  const s = existing || { name:'', category:(isIncome?incomeCats()[0].name:'Bills'), amount:'', cadence:'monthly', nextDate:'', active:true, note:'' };
  const cat = m.cat!==undefined ? m.cat : s.category;
  const cad = m.cadence!==undefined ? m.cadence : s.cadence;
  const active = m.active!==undefined ? m.active : s.active;
  const catList = isIncome ? incomeCats() : cats();
  const preview = m.amountPreview;
  const f = m.form || {};
  const val = (k, dflt)=> f[k]!==undefined ? f[k] : dflt;

  return `<div class="overlay" data-act="closeModal"><div class="sheet" data-stop="1">
    <div class="row"><div class="h-title grow" style="font-size:18px">${existing?'Edit':'New'} ${isIncome?'income source':'recurring bill'}</div>
      <button class="icon-btn" data-act="closeModal" style="width:32px;height:32px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>

    <div class="field"><label>Name</label><input class="input" id="s-name" value="${esc(val('name',s.name))}" placeholder="${isIncome?'e.g. Main paycheque':'e.g. Rent'}"></div>
    <div class="field"><label>Amount (${cur()}) each time</label><input class="input" id="s-amount" inputmode="decimal" value="${esc(val('amount',s.amount||''))}" placeholder="0.00"></div>

    <div class="field"><label>How often</label>
      <div class="chips">${CADENCE_KEYS.map(k=>`<button class="chip ${cad===k?'chip-on':''}" data-act="streamCadence" data-arg="${k}">${CADENCE[k].label}</button>`).join('')}</div>
    </div>
    ${preview!=null?`<div class="tx-sub" style="margin-top:-6px">That works out to <b style="color:var(--${isIncome?'income':'text'})">${money(perMonth(preview,cad))}</b> per month.</div>`:''}

    <div class="field"><label>Category</label>
      <div class="chips">${catList.map(c=>`<button class="chip ${cat===c.name?'chip-on':''}" data-act="streamCat" data-arg="${esc(c.name)}">${esc(c.icon)} ${esc(c.name)}</button>`).join('')}</div>
    </div>

    <div class="field"><label>Next ${isIncome?'payment':'bill'} date (optional)</label><input class="input" id="s-next" type="date" value="${esc(val('nextDate',s.nextDate||''))}"></div>
    <div class="field"><label>Note (optional)</label><input class="input" id="s-note" value="${esc(val('note',s.note||''))}" placeholder="Anything to remember"></div>

    <div class="row" style="padding:2px"><div class="grow"><div style="font-size:14px">Active</div>
      <div class="muted" style="font-size:11px">Paused items stay in the list but don't count</div></div>
      ${toggle(active,'streamActive')}</div>

    <div class="row" style="gap:10px;margin-top:4px">
      <button class="btn btn-primary grow" data-act="streamSave">${existing?'Save changes':'Add'}</button>
      ${existing?`<button class="btn btn-danger" data-act="streamDelete">Delete</button>`:''}
    </div>
  </div></div>`;
}
function autoLockModal(){
  const cur=S.data.settings.autoLockMin;
  const opts=[[0,'Only when reopened'],[1,'After 1 minute away'],[3,'After 3 minutes away'],[15,'After 15 minutes away']];
  return `<div class="overlay" data-act="closeModal"><div class="sheet" data-stop="1">
    <div class="h-title" style="font-size:18px">Auto-lock</div>
    <p class="muted" style="font-size:13px">How long FireRaven can sit in the background before it asks for your PIN again.</p>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${opts.map(([v,l])=>`<button class="btn ${cur===v?'btn-primary':'btn-ghost'} btn-block" data-act="setAutoLock" data-arg="${v}">${l}</button>`).join('')}
    </div>
    <button class="btn btn-ghost btn-block" data-act="closeModal">Cancel</button>
  </div></div>`;
}
function editTxModal(id){
  const t=S.data.txs.find(x=>x.id===id); if (!t) return '';
  const d=S.ui.modal;
  const cat=d.cat!==undefined?d.cat:(t.category||'Groceries');
  const type=d.type!==undefined?d.type:t.type;
  return `<div class="overlay" data-act="closeModal"><div class="sheet" data-stop="1">
    <div class="row"><div class="h-title grow" style="font-size:18px">Edit transaction</div><button class="icon-btn" data-act="closeModal" style="width:32px;height:32px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
    <div class="row" style="gap:8px"><button class="chip ${type==='expense'?'chip-on':''}" data-act="editTxType" data-arg="expense" style="flex:1;justify-content:center">Expense</button><button class="chip ${type==='income'?'chip-on':''}" data-act="editTxType" data-arg="income" style="flex:1;justify-content:center">Income</button></div>
    <div class="field"><label>Merchant</label><input class="input" id="e-merchant" value="${esc(t.merchant)}"></div>
    <div class="field"><label>Amount (${cur()})</label><input class="input" id="e-amount" inputmode="decimal" value="${t.amount}"></div>
    <div class="field"><label>Date</label><input class="input" id="e-date" type="date" value="${esc(t.date)}"></div>
    ${type==='expense'?`<div class="field"><label>Category</label><div class="chips">${catNames().map(c=>`<button class="chip ${cat===c?'chip-on':''}" data-act="editTxCat" data-arg="${esc(c)}">${esc(catBy(c).icon)} ${esc(c)}</button>`).join('')}</div></div>`:''}
    <div class="field"><label>Note</label><input class="input" id="e-note" value="${esc(t.note||'')}"></div>
    <div class="row" style="gap:10px;margin-top:4px"><button class="btn btn-primary grow" data-act="saveTx" data-arg="${id}">Save changes</button><button class="btn btn-danger" data-act="deleteTx" data-arg="${id}">Delete</button></div>
  </div></div>`;
}
function numberModal(m){
  return `<div class="overlay" data-act="closeModal"><div class="sheet" data-stop="1">
    <div class="h-title" style="font-size:18px">${m.title}</div>
    ${m.desc?`<p class="muted" style="font-size:13px">${m.desc}</p>`:''}
    <div class="field"><input class="input" id="num-input" inputmode="decimal" value="${m.value!=null?m.value:''}" placeholder="0"></div>
    <div class="row" style="gap:10px"><button class="btn btn-ghost grow" data-act="closeModal">Cancel</button><button class="btn btn-primary grow" data-act="numberSave">Save</button></div>
  </div></div>`;
}
function currencyModal(){
  const opts=[['CAD','en-CA'],['USD','en-US'],['GBP','en-GB'],['EUR','en-IE'],['AUD','en-AU'],['JPY','ja-JP'],['INR','en-IN']];
  return `<div class="overlay" data-act="closeModal"><div class="sheet" data-stop="1">
    <div class="h-title" style="font-size:18px">Currency</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${opts.map(([c,l])=>`<button class="btn ${cur()===c?'btn-primary':'btn-ghost'} btn-block" data-act="setCurrency" data-arg="${c}::${l}">${c}</button>`).join('')}
    </div>
    <button class="btn btn-ghost btn-block" data-act="closeModal">Cancel</button>
  </div></div>`;
}
function categoryModal(m){
  const isNew=m.new, inc=!!m.income;
  const pool=inc?incomeCats():cats();
  const c=isNew?{name:'',color:inc?'#79d6a8':SWATCHES[0],icon:inc?'💵':'•',budget:0}:pool.find(x=>x.name===m.name);
  if (!c) return '';
  const color=m.color!==undefined?m.color:c.color;
  const icon=m.icon!==undefined?m.icon:c.icon;
  return `<div class="overlay" data-act="closeModal"><div class="sheet" data-stop="1">

// Destructive operations, isolated so the confirm sheet is the only way in.
const DANGER = {
  reset: ()=>{
    try{ localStorage.removeItem(LS_KEY); localStorage.removeItem(LS_KEY_LEGACY);
         localStorage.removeItem(LS_APIKEY); localStorage.removeItem(LS_PIN);
         localStorage.removeItem(LS_SEEN); localStorage.removeItem(LS_FAIL); }catch(e){}
    S.apiKey=''; S.data=freshData(); S.ui.screen='onboarding'; S.ui.obStep=0;
    S.locked=false; save(); render(); toast('Everything erased','ok');
  },
  clearSample: ()=>{ const before=S.data.txs.length;
    S.data.txs=S.data.txs.filter(t=>!t.demo);
    save(); render(); toast((before-S.data.txs.length)+' sample transactions removed','ok'); },
  clearTxs: ()=>{ const n=S.data.txs.length; S.data.txs=[]; S.data.savings=null; S.data.done={};
    save(); render(); toast(n+' transactions deleted','ok'); },
  catDelete: (name)=>{
    S.data.txs.forEach(t=>{ if(t.category===name) t.category='Other'; });
    Object.keys(S.data.merchantMap).forEach(k=>{ if(S.data.merchantMap[k]===name) delete S.data.merchantMap[k]; });
    (S.data.recur||[]).forEach(r=>{ if(r.category===name) r.category='Other'; });
    S.data.categories=cats().filter(c=>c.name!==name);
    save(); render(); toast('Category deleted','ok'); },
  incCatDelete: (name)=>{
    (S.data.income||[]).forEach(i=>{ if(i.category===name) i.category='Other'; });
    S.data.incomeCats=incomeCats().filter(c=>c.name!==name);
    save(); render(); toast('Category deleted','ok'); },
  streamDelete: (which, id)=>{
    const key = which==='income'?'income':'recur';
    S.data[key]=(S.data[key]||[]).filter(x=>x.id!==id);
    save(); render(); toast('Deleted','ok'); },
};
function streamOf(m){
  if (!m || !m.id) return null;
  const list = m.which==='income' ? (S.data.income||[]) : (S.data.recur||[]);
  return list.find(x=>x.id===m.id) || null;
}
// Tapping a category or cadence chip re-renders the whole sheet, which would
// wipe anything already typed. Stash the live field values first.
function syncStream(){
  const m=S.ui.modal; if (!m) return;
  m.form = m.form || {};
  [['s-name','name'],['s-amount','amount'],['s-next','nextDate'],['s-note','note']].forEach(([id,k])=>{
    const el=$('#'+id); if (el) m.form[k]=el.value;
  });
  const v=parseFloat(String(m.form.amount||'').replace(/[^0-9.]/g,''));
  m.amountPreview = isNaN(v) ? null : v;
}

async function pinSubmit(){
  const entered=S.ui.pin;
  if (S.ui.pinMode==='set'){
    if (S.ui.pinStage===0){ S.ui.pinFirst=entered; S.ui.pinStage=1; S.ui.pin=''; render(); return; }
    if (entered!==S.ui.pinFirst){ S.ui.pinBad=true; S.ui.pin=''; S.ui.pinStage=0; S.ui.pinFirst=''; render(); return; }
    await pinSet(entered);
    S.data.settings.lockOn=true; save();
    S.ui.pinMode='unlock'; S.ui.pin=''; S.ui.pinStage=0; S.ui.pinFirst=''; S.ui.pinBad=false;
    S.locked=false; touchSeen(); S.ui.screen='settings'; render();
    toast('PIN updated','ok'); return;
  }
  if (lockoutLeft()){ S.ui.pin=''; S.ui.pinBad=true; render(); return; }
  const ok=await pinVerify(entered);
  if (ok){ clearFails(); S.locked=false; S.ui.pin=''; S.ui.pinBad=false; touchSeen(); render(); }
  else { noteFail(); S.ui.pinBad=true; S.ui.pin=''; render();
    if (navigator.vibrate) try{ navigator.vibrate(90); }catch(e){}
    setTimeout(()=>{ S.ui.pinBad=false; if (S.locked) render(); }, 700); }
}

function syncManual(){
  const g=(id)=>{ const el=$('#'+id); return el?el.value:undefined; };
  const m=g('m-merchant'), a=g('m-amount'), d=g('m-date'), n=g('m-note');
  if (m!==undefined) S.ui.add.merchant=m;
  if (a!==undefined) S.ui.add.amount=a;
  if (d!==undefined) S.ui.add.date=d;
  if (n!==undefined) S.ui.add.note=n;
}
function doImportCSV(text){
  if (!text || !text.trim()){ toast('Paste some CSV rows first','err'); return; }
  const items=csvToItems(text);
  if (!items.length){ toast("Couldn't find transactions in that CSV",'err'); return; }
  S.ui.screen='add'; finishBatch(items,'import');
}

    +".\nForecast: income "+money0(fc.income)+"/mo, commitments "+money0(fc.committed)+"/mo, everyday spending "+money0(fc.variable)+"/mo, net "+(fc.net>=0?'+':'')+money0(fc.net)+"/mo. Starting balance "+money0(fc.start)+", projected balance in 6 months "+money0(fc.at(6))+", in 12 months "+money0(fc.at(12))+(fc.runway!=null?". WARNING: at this rate the balance runs out in about "+fc.runway.toFixed(1)+" months":"")
    +".\nSafe to spend: "+(sts?money(sts.perDay)+"/day for "+sts.daysLeft+" days left":"n/a")
    +".\nSavings opportunities FireRaven has already found: "+money0(pot.total)+"/mo. Top ideas: "
    +(opportunities().slice(0,4).map(o=>o.title+' ('+money0(o.save)+'/mo)').join('; ')||'none yet')+".";
  return "You are FireRaven, a sharp, warm, witty pet-raven money assistant inside a personal spending-tracker app used by Wes. ALWAYS concise (2-4 sentences), direct and data-driven. Currency is "+cur()+"; format money like "+money(84.1)+". Use ONLY the data below — never invent transactions or numbers. If the data can't answer, say so briefly and suggest importing more. When giving savings advice, cite specific dollar amounts. Plain text only — no markdown, asterisks, bullets or headings.\n\n=== WES'S SPENDING ("+monthLabel(key)+") ===\nSpent this month: "+money(spent)+" across "+mt.filter(t=>t.type!=='income').length+" purchases.\nMonthly budget: "+money(S.data.settings.monthlyBudget)+".\nBy category: "+(totals||'none yet')+".\nItems needing a category: "+review+"."+extra+"\nRecent transactions (newest first):\n"+rows;
}
function ask(text){
  const t=(text||'').trim(); if(!t) return;
  const history=S.data.messages.filter(m=>m.text&&!m.typing).map(m=>({ role:m.role==='ai'?'assistant':'user', content:m.text }));
  S.data.messages.push({ role:'me', text:t });
  S.data.messages.push({ role:'ai', text:'', typing:true });
  S.ui.draft=''; render();
  answer(history, t);
}
async function answer(history, t){
  let ans;
  try { ans = hasKey() ? await llm({ system:systemPrompt(), messages:[...history,{ role:'user', content:t }], max_tokens:400 }) : localReply(t); }
  catch(e){ ans = localReply(t); }
  if (!ans || !ans.trim()) ans = localReply(t);
  for (let i=S.data.messages.length-1;i>=0;i--){ if (S.data.messages[i].typing){ S.data.messages[i]={ role:'ai', text:ans }; break; } }
  save(); render();
}
function localReply(t){
  const s=t.toLowerCase();
  const mt=monthTxs(curMonthKey());
  const ct=categoryTotals(mt);
  const rec=recurring();
  const get=(n)=>{ const c=ct.find(x=>x.name===n); return c?c.amount:0; };
  const spent=sumExpenses(mt), budget=S.data.settings.monthlyBudget;
  if (/dining|eat|restaurant/.test(s)){ const d=get('Dining'); return d?`Dining is at ${money(d)} this month. Cooking a couple of those at home would save roughly ${money0(d*0.3)}.`:"No dining purchases logged this month yet."; }
  if (/save|cut|cheap|afford/.test(s)){
    const ops=opportunities().filter(o=>!(S.data.done||{})[o.id]).slice(0,2);
    const pot=potentialMonthly();
    return ops.length
      ? `I've found about ${money0(pot.total)}/mo you could free up — roughly ${money0(pot.total*12)} a year. Biggest one: ${ops[0].title.replace(/<[^>]*>/g,'')} at ${money0(ops[0].save)}/mo.${ops[1]?` Next: ${ops[1].title.replace(/<[^>]*>/g,'')} (${money0(ops[1].save)}/mo).`:''} Open the Save tab for the full list.`
      : 'Import a few more transactions and I\'ll find specific cuts from your real spending.'; }
  if (/subscription|recurring/.test(s)){
    const subs=subscriptions().filter(x=>!x.cancelled);
    return subs.length
      ? `You have ${subs.length} subscription${subs.length>1?'s':''} costing ${money0(subs.reduce((a,r)=>a+r.monthly,0))}/mo — about ${money0(subs.reduce((a,r)=>a+r.annual,0))} a year. ${subs[0].name} is the biggest at ${money(subs[0].monthly)}/mo.`
      : 'No true subscriptions detected yet — those appear once a recognised service or steady bill shows up across two months.'; }
  if (/forecast|balance|future|project|runway|in 6 month|in a year|end up/.test(s)){
    const f=forecast();
    if (f.income<=0 && f.outflow<=0) return 'Add your income in Plan → Income and import some spending, and I\'ll project your balance forward.';
    if (f.runway!=null) return `At ${money0(-f.net)}/mo short, your ${money0(f.start)} balance lasts about ${f.runway.toFixed(1)} months. Cutting ${money0(-f.net)}/mo breaks even — the Save tab has ideas.`;
    return `You're keeping about ${money0(f.net)}/mo. From your ${money0(f.start)} starting balance, that's roughly ${money0(f.at(6))} in 6 months and ${money0(f.at(12))} in a year.`; }
  if (/income|earn|paycheque|paycheck|salary/.test(s)){
    const inc=activeIncome();
    return inc.length ? `You've declared ${inc.length} income source${inc.length>1?'s':''} totalling ${money0(plannedIncome())}/mo: ${inc.map(i=>i.name+' ('+money0(perMonth(i.amount,i.cadence))+'/mo)').join(', ')}.`
      : 'No income sources declared yet — add your paycheque under Plan → Income and I can forecast what you\'ll keep.'; }
  if (/safe|today|per day|daily/.test(s)){ const st=safeToSpend(curMonthKey());
    return st ? (st.over ? `You're ${money0(Math.abs(st.remaining))} past your budget with ${st.daysLeft} days to go.` : `You can spend about ${money(st.perDay)} a day for the ${st.daysLeft} days left and still land on budget.`)
              : 'Set a monthly budget in Settings and I\'ll tell you what\'s safe to spend each day.'; }
  if (/budget/.test(s)){ return budget>0?`You're at about ${Math.round(spent/budget*100)}% of your ${money0(budget)} budget this month (${money0(spent)} spent).`:'You haven\'t set a monthly budget yet — add one in Settings.'; }
  if (/review|unknown|uncategor/.test(s)){ const r=S.data.txs.filter(t=>t.needsReview).length; return r?`There are ${r} purchases waiting in Needs review — open the inbox and I'll suggest a category for each.`:"Everything's categorized — nothing waiting in review."; }
  return `This month you've spent ${money0(spent)} across ${mt.filter(t=>t.type!=='income').length} purchases. Ask me about a category, your subscriptions, budget, or where to save.`;
}

// ═══════════════════════════════════════════════════════════════════════
// EVENT WIRING
// ═══════════════════════════════════════════════════════════════════════
document.addEventListener('click', (e)=>{
  const el=e.target.closest('[data-act]');
  if (!el) return;
  /* Tapping inside a sheet must not fall through to the overlay's close
     handler. closest() already resolves to the innermost [data-act], so a real
     button wins on its own; the only case to suppress is a tap that landed on
     dead space inside the sheet and walked all the way up to the backdrop.

     This used to be done with a capture-phase stopPropagation(), which killed
     the event before it ever reached this delegated listener — every control
     inside every sheet was inert. */
  if (el.classList.contains('overlay') && e.target.closest('[data-stop]')) return;
  const act=el.dataset.act;
  if (H[act]){ e.preventDefault(); H[act](el); }
});

// live search (partial re-render of list only)
document.addEventListener('input', (e)=>{
  const el=e.target;
  if (el.id==='act-search'){ S.ui.search=el.value; updateActivityList(); }
  else if (el.dataset && el.dataset.field==='model'){ S.data.settings.model=el.value; save(); }
});
document.addEventListener('keydown', (e)=>{
  if (e.key==='Enter' && e.target.id==='chat-input'){ e.preventDefault(); ask(e.target.value); }
});
// filter chips update state then full render (chips need active repaint)
// handled by H via data-act
H.filterCat = (el)=>{ S.ui.filterCat=el.dataset.arg; render(); };

function updateActivityList(){
  // rebuild only #act-list to preserve search-input focus
  const key=selMonth();
  let list=monthTxs(key);
  const q=S.ui.search.trim().toLowerCase();
  const fc=S.ui.filterCat;
  if (fc!=='All') list = fc==='Income' ? list.filter(t=>t.type==='income') : list.filter(t=>t.category===fc);
  if (q) list=list.filter(t=>t.merchant.toLowerCase().includes(q)||(t.note||'').toLowerCase().includes(q)||(t.category||'').toLowerCase().includes(q));
  const groups={}; list.forEach(t=>{ (groups[t.date]=groups[t.date]||[]).push(t); });
  const dates=Object.keys(groups).sort().reverse();
  const node=$('#act-list'); if (!node) return;
  node.innerHTML = dates.length
    ? dates.map(d=>`<div><div class="tx-sub" style="margin:2px 6px 4px;font-weight:600">${fmtDate(d)}</div>${groups[d].map(txRow).join('')}</div>`).join('')
    : `<p class="muted" style="font-size:13px;margin-top:6px">Nothing matches.</p>`;
}

// file inputs
$('#img-input').addEventListener('change', (e)=>{
  const files=Array.from(e.target.files||[]); e.target.value='';
  if (files.length) scanFiles(files);
});
$('#cam-input').addEventListener('change', (e)=>{
  const files=Array.from(e.target.files||[]); e.target.value='';
  if (files.length) scanFiles(files);
});
$('#restore-input').addEventListener('change', (e)=>{
  const f=e.target.files&&e.target.files[0]; e.target.value='';
  if (!f) return; const r=new FileReader(); r.onload=()=>restoreJSON(String(r.result)); r.readAsText(f);
});

// physical keyboard on the lock screen (desktop convenience)
document.addEventListener('keydown', (e)=>{
  if (!S.locked) return;
  if (/^[0-9]$/.test(e.key)){ e.preventDefault(); H.pinKey({ dataset:{ arg:e.key } }); }
  else if (e.key==='Backspace'){ e.preventDefault(); H.pinDel(); }
});

// auto-lock when the app goes to the background
document.addEventListener('visibilitychange', ()=>{
  if (document.visibilityState==='hidden'){ touchSeen(); }
  else if (!S.locked && shouldRelock()){ S.ui.pin=''; S.ui.pinMode='unlock'; S.locked=true; render(); }
});
window.addEventListener('pagehide', touchSeen);

// ---- boot ---------------------------------------------------------------
load();
S.data.settings.model = S.data.settings.model || 'claude-haiku-4-5';
S.ui.add.cat = catNames()[0] || 'Groceries';
// Home-screen shortcuts (manifest.webmanifest) land here with ?a=<screen>.
// They pick the destination; the PIN lock below still gates entry to it.
try {
  const a = new URLSearchParams(location.search).get('a');
  if (a && S.data.onboarded && ['add','assistant','save','insights','activity'].includes(a)) S.ui.screen = a;
} catch(e){}
S.locked = lockEnabled() && S.data.onboarded;
if (!S.locked) touchSeen();
render();

if ('serviceWorker' in navigator){
  window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
